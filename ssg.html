<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSG Agency</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#111;min-height:100vh}

.navbar{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid #eee;position:sticky;top:0;z-index:100}
.nav-inner{max-width:680px;margin:auto;padding:10px 20px;display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:6px;text-decoration:none;color:#ff7a00;font-weight:700;font-size:.9rem}
.back-btn svg{flex-shrink:0}
.nav-title{font-weight:900;font-size:.95rem;color:#111}

.page{max-width:680px;margin:0 auto;padding:24px 16px 48px}
.section-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin:24px 0 10px}

.hero-card{background:white;border-radius:24px;padding:32px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:8px}
.group-logo{height:90px;width:auto;max-width:200px;object-fit:contain;display:block;margin:0 auto 20px}
.group-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:6px}
.ace-total{font-size:2.4rem;font-weight:900;color:#ff7a00;letter-spacing:-.04em}
.ace-sub{font-size:.78rem;color:#aaa;margin-top:4px}
.stat-row{display:flex;justify-content:center;gap:28px;margin-top:20px;padding-top:20px;border-top:1px solid #f0f0f0}
.stat-val{font-size:1.15rem;font-weight:900;color:#111}
.stat-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-top:2px}

.viz-root{background:white;border-radius:20px;padding:20px 20px 14px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:8px;position:relative}
.bar-row{display:flex;align-items:center;gap:10px;padding:5px 0;cursor:default}
.bar-row+.bar-row{margin-top:4px}
.bar-lbl{width:72px;font-size:.78rem;font-weight:700;color:#52514e;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:#f0efec;border-radius:4px;height:20px;overflow:hidden}
.bar-fill{height:100%;background:#ff7a00;width:0;border-radius:0 4px 4px 0;transition:width .65s cubic-bezier(.4,0,.2,1)}
.bar-hover .bar-fill{opacity:.82}
.bar-val{width:130px;font-size:.76rem;font-weight:700;color:#52514e;flex-shrink:0;white-space:nowrap}
.chart-foot{display:flex;justify-content:space-between;padding:10px 0 0;margin-top:6px;border-top:1px solid #f0efec}
.chart-foot-tick{font-size:.65rem;color:#898781;font-variant-numeric:tabular-nums}

.chart-tip{position:fixed;background:#1a1a19;color:#fff;border-radius:10px;padding:10px 14px;pointer-events:none;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);min-width:160px}
.tip-name{font-size:.72rem;color:#c3c2b7;margin-bottom:4px}
.tip-val{font-size:.95rem;font-weight:900;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.tip-pct{font-size:.7rem;color:#c3c2b7;margin-top:3px}

.agent-card{background:white;border-radius:18px;padding:16px 18px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:10px;display:flex;align-items:center;gap:14px}
.agent-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#ff7a00,#ffb347);display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:1rem;flex-shrink:0}
.agent-name{font-weight:800;font-size:.92rem;line-height:1.3}
.agent-meta{font-size:.72rem;color:#aaa;margin-top:2px}
.agent-ace{margin-left:auto;text-align:right;flex-shrink:0}
.agent-ace-val{font-weight:900;color:#ff7a00;font-size:.95rem;font-variant-numeric:tabular-nums}
.agent-ace-lbl{font-size:.65rem;color:#aaa;margin-top:1px}

.loading{text-align:center;color:#aaa;padding:40px;font-size:.9rem}
.updated{font-size:.65rem;color:#ccc;text-align:center;margin-top:16px}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-inner">
    <a class="back-btn" href="index.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Kembali
    </a>
    <span class="nav-title">SSG Agency</span>
  </div>
</div>

<div class="page">

  <div class="hero-card">
    <img src="assets/logo-ssg.png" alt="SSG" class="group-logo">
    <div class="group-label">Total ACE Production</div>
    <div class="ace-total" id="aceTotal">—</div>
    <div class="ace-sub" id="aceSub">Loading…</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-val" id="statAgents">—</div><div class="stat-lbl">Agents</div></div>
      <div class="stat"><div class="stat-val" id="statClients">—</div><div class="stat-lbl">Clients</div></div>
      <div class="stat"><div class="stat-val" id="statInforce">—</div><div class="stat-lbl">In Force</div></div>
    </div>
  </div>

  <div class="section-lbl">ACE Production</div>
  <div class="viz-root" id="chartWrap" style="display:none">
    <div id="chartBars"></div>
    <div class="chart-foot" id="chartFoot"></div>
  </div>
  <div class="chart-tip" id="chartTip" style="display:none"></div>

  <div class="section-lbl">Our Agents</div>
  <div id="agentList"><div class="loading">Loading…</div></div>
  <div class="updated" id="updated"></div>

</div>

<script>
// SSG: Fadhlan (A15756) > Fauzan (A15781) > Adam (A16553)
const MEMBERS = ['A15756', 'A15781', 'A16553'];

function fmtRM(v) {
  return 'RM ' + v.toLocaleString('en-MY', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtRMshort(v) {
  if (v >= 1000) return 'RM ' + (v/1000).toFixed(0) + 'K';
  return 'RM ' + Math.round(v);
}
function initials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}
function shortFirst(name) {
  return name.split(' ')[0];
}

const tip = document.getElementById('chartTip');
function showTip(e, name, ace, total) {
  const pct = total > 0 ? (ace / total * 100).toFixed(1) : '0.0';
  const n = document.createElement('div'); n.className = 'tip-name'; n.textContent = name;
  const v = document.createElement('div'); v.className = 'tip-val'; v.textContent = fmtRM(ace);
  const p = document.createElement('div'); p.className = 'tip-pct'; p.textContent = pct + '% of group total';
  tip.innerHTML = '';
  tip.appendChild(n); tip.appendChild(v); tip.appendChild(p);
  tip.style.display = 'block';
  moveTip(e);
}
function hideTip() { tip.style.display = 'none'; }
function moveTip(e) {
  if (tip.style.display === 'none') return;
  const x = e.clientX + 16, y = e.clientY - 14;
  tip.style.left = Math.min(x, window.innerWidth  - tip.offsetWidth  - 12) + 'px';
  tip.style.top  = Math.min(y, window.innerHeight - tip.offsetHeight - 12) + 'px';
}
document.addEventListener('mousemove', moveTip);

function renderChart(rows, total) {
  const wrap = document.getElementById('chartWrap');
  const barsEl = document.getElementById('chartBars');
  const footEl = document.getElementById('chartFoot');
  if (!rows.length) return;

  const maxAce = Math.max(...rows.map(r => r.ace));
  const rawStep = maxAce / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const step = Math.ceil(rawStep / mag) * mag;
  const ticks = [];
  for (let t = 0; t <= maxAce * 1.05; t += step) ticks.push(t);

  barsEl.innerHTML = '';
  rows.forEach(ag => {
    const pct = maxAce > 0 ? (ag.ace / maxAce * 100) : 0;

    const row = document.createElement('div');
    row.className = 'bar-row';

    const lbl = document.createElement('div');
    lbl.className = 'bar-lbl';
    lbl.textContent = shortFirst(ag.name);

    const track = document.createElement('div');
    track.className = 'bar-track';

    const fill = document.createElement('div');
    fill.className = 'bar-fill';

    const val = document.createElement('div');
    val.className = 'bar-val';
    val.textContent = fmtRM(ag.ace);

    track.appendChild(fill);
    row.appendChild(lbl);
    row.appendChild(track);
    row.appendChild(val);
    barsEl.appendChild(row);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => { fill.style.width = pct.toFixed(2) + '%'; });
    });

    row.addEventListener('mouseenter', e => { row.classList.add('bar-hover'); showTip(e, ag.name, ag.ace, total); });
    row.addEventListener('mouseleave', () => { row.classList.remove('bar-hover'); hideTip(); });
  });

  footEl.innerHTML = '';
  ticks.forEach(t => {
    const span = document.createElement('span');
    span.className = 'chart-foot-tick';
    span.textContent = t === 0 ? '0' : fmtRMshort(t);
    footEl.appendChild(span);
  });

  wrap.style.display = 'block';
}

fetch('data/pr-data.json')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(data => {
    const byCode = {};
    data.agents.forEach(a => { byCode[a.code] = a; });

    let totalAce = 0, totalClients = 0, totalInforce = 0;
    const rows = [];

    MEMBERS.forEach(code => {
      const ag = byCode[code];
      if (!ag) return;
      const ace = (ag.clients || []).reduce((s, c) => s + (c.ace || 0), 0);
      const inforce = (ag.clients || []).filter(c => c.status === 'In Force').length;
      totalAce += ace;
      totalClients += (ag.clients || []).length;
      totalInforce += inforce;
      rows.push({ code, name: ag.name, ace, clients: (ag.clients || []).length, inforce });
    });

    rows.sort((a, b) => b.ace - a.ace);

    document.getElementById('aceTotal').textContent = fmtRM(totalAce);
    document.getElementById('aceSub').textContent   = 'Combined group ACE';
    document.getElementById('statAgents').textContent  = rows.length;
    document.getElementById('statClients').textContent = totalClients;
    document.getElementById('statInforce').textContent = totalInforce;
    if (data.updated) document.getElementById('updated').textContent = 'Data as of ' + data.updated;

    renderChart(rows, totalAce);

    const list = document.getElementById('agentList');
    list.innerHTML = '';
    rows.forEach(ag => {
      const card = document.createElement('div');
      card.className = 'agent-card';

      const av = document.createElement('div');
      av.className = 'agent-avatar';
      av.textContent = initials(ag.name);

      const info = document.createElement('div');
      const nm = document.createElement('div'); nm.className = 'agent-name'; nm.textContent = ag.name;
      const mt = document.createElement('div'); mt.className = 'agent-meta';
      mt.textContent = ag.code + ' · ' + ag.clients + ' clients · ' + ag.inforce + ' in force';
      info.appendChild(nm); info.appendChild(mt);

      const aceDiv = document.createElement('div');
      aceDiv.className = 'agent-ace';
      const av2 = document.createElement('div'); av2.className = 'agent-ace-val'; av2.textContent = fmtRM(ag.ace);
      const al = document.createElement('div'); al.className = 'agent-ace-lbl'; al.textContent = 'ACE';
      aceDiv.appendChild(av2); aceDiv.appendChild(al);

      card.appendChild(av); card.appendChild(info); card.appendChild(aceDiv);
      list.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById('aceSub').textContent = 'Data tidak tersedia';
    document.getElementById('agentList').innerHTML = '';
  });
</script>
</body>
</html>
