<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TSLA Client Workspace</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:0}
body{background:#f7f8fa;color:#111}
.header{position:sticky;top:0;background:#fff;padding:10px;border-bottom:1px solid #eee;text-align:center}
.container{max-width:900px;margin:auto;padding:18px}
.back{text-decoration:none;color:#ff7a00;font-weight:700;display:inline-block;margin-bottom:14px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 3px 16px rgba(0,0,0,.06);margin-bottom:18px}
h2{margin-bottom:10px}
.row{margin:8px 0}
.label{color:#777;font-size:13px;font-weight:700}
.value{font-weight:700}
button{width:100%;padding:14px;border:none;border-radius:14px;margin-top:10px;font-weight:700}
.orange{background:#ff7a00;color:#fff}.green{background:#25D366;color:#fff}.red{background:#e53935;color:#fff}
#edit{display:none}
input{width:100%;padding:14px;border:2px solid #eee;border-radius:12px;margin:6px 0}
</style></head><body>
<div class="header"><b>TSLA</b></div>
<div class="container">
<a class="back" href="clients.html">← Clients</a>
<div class="card">
<h2 id="title">👤 Client Workspace</h2>
<div class="row"><div class="label">IC</div><div class="value" id="icv"></div></div>
<div class="row"><div class="label">Phone</div><div class="value" id="phonev"></div></div>
<div class="row"><div class="label">Email</div><div class="value" id="emailv"></div></div>
<div class="row"><div class="label">Address</div><div class="value" id="addressv"></div></div>
</div>

<div class="card">
<h2>📜 Policy</h2>
<div class="row"><div class="label">Certificate</div><div class="value" id="certv"></div></div>
<div class="row"><div class="label">Bank</div><div class="value" id="bankv"></div></div>
<div class="row"><div class="label">Account</div><div class="value" id="accountv"></div></div>
<div class="row"><div class="label">Holder</div><div class="value" id="holderv"></div></div>
</div>

<div class="card">
<h2>✍️ Signature</h2>
<button class="orange" onclick="location.href='client-signature.html'">Manage Signature</button>
</div>

<div class="card">
<h2>📄 Forms</h2>
<button class="orange" onclick="location.href='cancellation-form.html'">FWD Cancellation</button>
<button class="green" onclick="location.href='bl714.html'">BL714</button>
</div>

<div class="card">
<h2>⚙️ Client Actions</h2>
<button class="orange" onclick="toggleEdit()">✏️ Edit Client</button>
<button class="red" onclick="clearClient()">🗑 Delete Client</button>
</div>

<div class="card" id="edit">
<h2>Edit Client</h2>
<input id="name"><input id="ic"><input id="phone"><input id="email"><input id="address">
<input id="certificate"><input id="bank"><input id="account"><input id="holder">
<button class="orange" onclick="save()">💾 Save</button>
<button class="green" onclick="toggleEdit()">Cancel</button>
</div>
</div>
<script>
function load(){
let c=JSON.parse(localStorage.getItem('tslaClient')||'{}');
title.innerText='👤 '+(c.name||'No Client');
['ic','phone','email','address','certificate','bank','account','holder'].forEach(k=>{
let e=document.getElementById(k+'v');if(e)e.innerText=c[k]||'-';
let i=document.getElementById(k);if(i)i.value=c[k]||'';
});
name.value=c.name||'';
}
function toggleEdit(){edit.style.display=edit.style.display=='block'?'none':'block'}
function save(){
let c={name:name.value,ic:ic.value,phone:phone.value,email:email.value,address:address.value,certificate:certificate.value,bank:bank.value,account:account.value,holder:holder.value};
localStorage.setItem('tslaClient',JSON.stringify(c));toggleEdit();load();
}
function clearClient(){if(confirm('Delete current client?')){localStorage.removeItem('tslaClient');location.reload();}}
load();
</script></body></html>
