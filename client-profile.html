<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSLA Client Profile</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
body{
background:#f7f8fa;
color:#111;
}
.header{
position:sticky;
top:0;
background:white;
border-bottom:1px solid #eee;
padding:4px 12px;
z-index:100;
min-height:55px;
display:flex;
align-items:center;
justify-content:center;
}
.logo{
width:50px;
height:auto;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.back{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
color:#ff7a00;
font-weight:700;
}
.card{
background:white;
padding:24px;
border-radius:24px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
margin-bottom:20px;
}
.title{
font-size:1.8rem;
font-weight:900;
margin-bottom:8px;
}
.subtitle{
color:#666;
margin-bottom:20px;
}
.input-group{
margin-bottom:16px;
}
.label{
display:block;
font-weight:700;
margin-bottom:8px;
color:#555;
}
.input{
width:100%;
padding:15px;
border-radius:16px;
border:2px solid #eee;
font-size:16px;
outline:none;
}
.input:focus{
border-color:#ff7a00;
}
.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-weight:700;
font-size:16px;
cursor:pointer;
margin-top:10px;
}
.save-btn{
background:#ff7a00;
color:white;
}
.clear-btn{
background:#efefef;
color:#444;
}
.status{
margin-top:15px;
padding:12px;
border-radius:12px;
background:#e8f7ec;
color:#1f7a3f;
font-weight:700;
display:none;
}
.preview{
background:white;
padding:24px;
border-radius:24px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.preview-title{
font-size:1.2rem;
font-weight:800;
margin-bottom:15px;
}
.preview p{
margin-bottom:10px;
line-height:1.5;
}
</style>
</head>
<body>
<div class="header">
<img
src="https://njmii.github.io/tsla-group/assets/tslalogo.png"
class="logo">
</div>
<div class="container">
<a href="index.html" class="back">
← Home
</a>
<div class="card">
<div class="title">
👤 Client Profile
</div>
<div class="subtitle">
Save customer information for future forms.
</div>
<div class="input-group">
<label class="label">Full Name</label>
<input id="name" class="input">
</div>
<div class="input-group">
<label class="label">IC Number</label>
<input id="ic" class="input">
</div>
<div class="input-group">
<label class="label">Phone Number</label>
<input id="phone" class="input">
</div>
<div class="input-group">
<label class="label">Email</label>
<input id="email" class="input">
</div>
<div class="input-group">
<label class="label">Address</label>
<input id="address" class="input">
</div>
<div class="input-group">
<label class="label">Certificate Number</label>
<input id="certificate" class="input">
</div>
<div class="input-group">
<label class="label">Bank Name</label>
<input id="bank" class="input">
</div>
<div class="input-group">
<label class="label">Bank Account Number</label>
<input id="account" class="input">
</div>
<div class="input-group">
<label class="label">Account Holder Name</label>
<input id="holder" class="input">
</div>
<button class="btn save-btn" onclick="saveClient()">
💾 Save Client
</button>
<button class="btn clear-btn" onclick="clearClient()">
🗑 Clear Client
</button>
<div id="status" class="status">
Client Saved Successfully
</div>
</div>
<div class="preview">
<div class="preview-title">
Current Client
</div>
<div id="previewContent">
No client saved.
</div>
</div>
</div>
<script>
function saveClient(){
const client = {
name:document.getElementById('name').value,
ic:document.getElementById('ic').value,
phone:document.getElementById('phone').value,
email:document.getElementById('email').value,
address:document.getElementById('address').value,
certificate:document.getElementById('certificate').value,
bank:document.getElementById('bank').value,
account:document.getElementById('account').value,
holder:document.getElementById('holder').value
};
localStorage.setItem(
'tslaClient',
JSON.stringify(client)
);
document.getElementById('status').style.display='block';
loadPreview();
}
function clearClient(){
localStorage.removeItem('tslaClient');
location.reload();
}
function loadPreview(){
const data =
JSON.parse(
localStorage.getItem('tslaClient')
);
if(!data) return;
document.getElementById('name').value=data.name||'';
document.getElementById('ic').value=data.ic||'';
document.getElementById('phone').value=data.phone||'';
document.getElementById('email').value=data.email||'';
document.getElementById('address').value=data.address||'';
document.getElementById('certificate').value=data.certificate||'';
document.getElementById('bank').value=data.bank||'';
document.getElementById('account').value=data.account||'';
document.getElementById('holder').value=data.holder||'';
document.getElementById('previewContent').innerHTML=`
<p><b>Name:</b> ${data.name||''}</p>
<p><b>IC:</b> ${data.ic||''}</p>
<p><b>Phone:</b> ${data.phone||''}</p>
<p><b>Certificate:</b> ${data.certificate||''}</p>
<p><b>Bank:</b> ${data.bank||''}</p>
`;
}
loadPreview();
</script>
</body>
</html>
