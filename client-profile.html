<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>client-profile.html</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,Segoe UI,sans-serif;margin:0;padding:0}
body{background:#f7f8fa}.header{background:#fff;padding:14px;text-align:center;border-bottom:1px solid #eee;font-weight:700;position:sticky;top:0}
.container{max-width:900px;margin:auto;padding:18px}.back{display:inline-block;margin-bottom:14px;color:#ff7a00;text-decoration:none;font-weight:700}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 3px 16px rgba(0,0,0,.06);margin-bottom:18px}
.label{font-size:12px;color:#777;font-weight:700}.value{font-weight:700;margin:4px 0 10px}
button{width:100%;padding:14px;border:none;border-radius:14px;margin-top:10px;font-weight:700}
.o{background:#ff7a00;color:#fff}.g{background:#25D366;color:#fff}.r{background:#e53935;color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.grid button{width:auto;margin-top:0;padding:11px 8px;font-size:13px}
#edit{display:none}input,textarea{width:100%;padding:13px;border:2px solid #eee;border-radius:12px;margin:6px 0 12px}
h3{margin:10px 0;color:#777;font-size:14px}
</style></head><body>
<div class="header">TSLA</div>
<div class="container">
<a class="back" href="clients.html">← Clients</a>
<div class="card">
<h2 id="title">👤 Client Workspace</h2>
<h3>PERSONAL</h3>
<div class="label">Name</div><div id="namev" class="value">-</div>
<div class="label">IC</div><div id="icv" class="value">-</div>
<div class="label">Phone</div><div id="phonev" class="value">-</div>
<div class="label">Email</div><div id="emailv" class="value">-</div>
<div class="label">Address</div><div id="addressv" class="value">-</div>
<h3>POLICY</h3>
<div class="label">Certificate</div><div id="certificatev" class="value">-</div>
<h3>BANK</h3>
<div class="label">Bank</div><div id="bankv" class="value">-</div>
<div class="label">Account</div><div id="accountv" class="value">-</div>
<div class="label">Holder</div><div id="holderv" class="value">-</div>
</div>
<div class="card">
<div class="grid">
<button class="o" onclick="location.href='client-signature.html'">✍️ Signature</button>
<button class="o" onclick="location.href='cancellation-form.html'">📄 FWD Cancel</button>
</div>
<div class="grid" style="margin-top:8px">
<button class="g" onclick="location.href='bl714.html'">BL714</button>
<button class="g" onclick="location.href='ge.html'">GE</button>
<button class="g" onclick="location.href='wl548.html'">WL548</button>
<button class="g" onclick="location.href='b0270.html'">B0270</button>
<button class="g" onclick="location.href='wl513.html'">WL513</button>
</div>
</div>
<div class="card">
<h3 style="margin-bottom:10px">Documents</h3>
<div id="docList" style="margin-bottom:10px"></div>
<label class="o" style="display:block;padding:13px;border-radius:12px;text-align:center;font-weight:700;cursor:pointer">
  + Upload Document
  <input type="file" id="docFile" multiple style="display:none" onchange="uploadDoc(this)">
</label>
</div>
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center">
  <div>
    <div class="label">Payment Method</div>
    <div id="biroStatus" style="font-weight:700;font-size:1rem"></div>
  </div>
  <button id="biroBtn" onclick="toggleBiro()" style="padding:10px 18px;border-radius:14px;border:none;font-weight:700;font-size:.9rem;cursor:pointer"></button>
</div>
</div>
<div class="card">
<div class="grid">
<button class="o" onclick="toggleEdit()">✏️ Edit</button>
<button class="r" onclick="removeClient()">🗑 Delete</button>
</div>
</div>
<div class="card" id="edit">
<label>Name</label><input id="name">
<label>IC</label><input id="ic">
<label>Phone</label><input id="phone">
<label>Email</label><input id="email">
<label>Address</label><textarea id="address"></textarea>
<label>Certificate</label><input id="certificate">
<label>Bank</label><input id="bank">
<label>Account</label><input id="account">
<label>Holder</label><input id="holder">
<button class="o" onclick="saveClient()">💾 Save</button>
<button class="g" onclick="toggleEdit()">Cancel</button>
</div>
</div>
<script>
function migrate(){
 const legacy=JSON.parse(localStorage.getItem("tslaClient")||"null");
 if(legacy&&legacy.id&&legacy.name&&!localStorage.getItem("tslaCurrentClientId")){
   localStorage.setItem("tslaCurrentClientId",String(legacy.id));
 }
}
function current(){
 migrate();
 const id=String(localStorage.getItem("tslaCurrentClientId")||"");
 const arr=JSON.parse(localStorage.getItem("tslaClients")||"[]");
 return arr.find(x=>String(x.id)===id)||{};
}
function load(){
 const c=current();
 document.getElementById("title").textContent="👤 "+(c.name||"Client Workspace");
 ["name","ic","phone","email","address","certificate","bank","account","holder"].forEach(function(k){
   const v=document.getElementById(k+"v"); if(v) v.textContent=c[k]||"-";
   const inp=document.getElementById(k); if(inp) inp.value=c[k]||"";
 });
 renderBiro(c);
 renderDocs();
}
function renderBiro(c){
 const isBiro=!!c.biro;
 document.getElementById("biroStatus").innerHTML=isBiro
  ? '<span style="color:#0a9b43">✅ Biro</span>'
  : '<span style="color:#e53935">⚠️ Manual — High Alert</span>';
 const btn=document.getElementById("biroBtn");
 btn.textContent=isBiro?"Remove Biro":"Mark as Biro";
 btn.style.background=isBiro?"#eee":"#ff7a00";
 btn.style.color=isBiro?"#333":"white";
}
function toggleBiro(){
 const arr=JSON.parse(localStorage.getItem("tslaClients")||"[]");
 const id=String(localStorage.getItem("tslaCurrentClientId")||"");
 const idx=arr.findIndex(x=>String(x.id)===id);
 if(idx<0)return;
 arr[idx].biro=!arr[idx].biro;
 localStorage.setItem("tslaClients",JSON.stringify(arr));
 renderBiro(arr[idx]);
}
function docPreview(d){
 if(d.type&&d.type.startsWith('image/')){
  return `<img src="${d.data}" style="width:100%;max-height:180px;object-fit:contain;border-radius:10px;margin-bottom:8px;background:#f7f8fa">`;
 }
 if(d.type==='application/pdf'){
  return `<iframe src="${d.data}" style="width:100%;height:200px;border:none;border-radius:10px;margin-bottom:8px"></iframe>`;
 }
 return `<div style="background:#f7f8fa;border-radius:10px;padding:20px;text-align:center;font-size:2rem;margin-bottom:8px">📄</div>`;
}
function renderDocs(){
 const c=current();
 const docs=c.documents||[];
 const el=document.getElementById("docList");
 if(!docs.length){el.innerHTML='<div style="color:#888;font-size:13px">No documents yet</div>';return;}
 el.innerHTML=docs.map(d=>`<div style="padding:10px 0;border-bottom:1px solid #eee">
  ${docPreview(d)}
  <div style="display:flex;justify-content:space-between;align-items:center">
   <div style="font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name}<div style="color:#888;font-size:11px">${d.uploadedAt}</div></div>
   <div style="display:flex;gap:6px;margin-left:8px">
    <button onclick="downloadDoc('${d.id}')" style="padding:6px 10px;border:none;border-radius:8px;background:#25D366;color:#fff;font-weight:700;cursor:pointer">↓</button>
    <button onclick="deleteDoc('${d.id}')" style="padding:6px 10px;border:none;border-radius:8px;background:#e53935;color:#fff;font-weight:700;cursor:pointer">×</button>
   </div>
  </div>
 </div>`).join('');
}
function uploadDoc(input){
 if(!input.files.length)return;
 const files=Array.from(input.files);
 let loaded=0;
 files.forEach(file=>{
  const reader=new FileReader();
  reader.onload=e=>{
   const arr=JSON.parse(localStorage.getItem("tslaClients")||"[]");
   const id=String(localStorage.getItem("tslaCurrentClientId")||"");
   const idx=arr.findIndex(x=>String(x.id)===id);
   if(idx>=0){
    if(!arr[idx].documents)arr[idx].documents=[];
    arr[idx].documents.push({id:Date.now().toString()+"_"+loaded,name:file.name,type:file.type,data:e.target.result,uploadedAt:new Date().toLocaleDateString()});
    localStorage.setItem("tslaClients",JSON.stringify(arr));
   }
   loaded++;
   if(loaded===files.length){input.value="";renderDocs();}
  };
  reader.readAsDataURL(file);
 });
}
function downloadDoc(docId){
 const c=current();
 const doc=(c.documents||[]).find(d=>d.id===docId);
 if(!doc)return;
 const link=document.createElement("a");
 link.href=doc.data;link.download=doc.name;link.click();
}
function deleteDoc(docId){
 if(!confirm("Delete document?"))return;
 const arr=JSON.parse(localStorage.getItem("tslaClients")||"[]");
 const id=String(localStorage.getItem("tslaCurrentClientId")||"");
 const idx=arr.findIndex(x=>String(x.id)===id);
 if(idx<0)return;
 arr[idx].documents=(arr[idx].documents||[]).filter(d=>d.id!==docId);
 localStorage.setItem("tslaClients",JSON.stringify(arr));
 renderDocs();
}
function toggleEdit(){
 const e=document.getElementById("edit");
 e.style.display=e.style.display==="block"?"none":"block";
}
function saveClient(){
 const arr=JSON.parse(localStorage.getItem("tslaClients")||"[]");
 const id=String(localStorage.getItem("tslaCurrentClientId")||"");
 const idx=arr.findIndex(x=>String(x.id)===id);
 if(idx<0){alert("Client not found");return;}
 arr[idx]={
   ...arr[idx],
   name:document.getElementById("name").value,
   ic:document.getElementById("ic").value,
   phone:document.getElementById("phone").value,
   email:document.getElementById("email").value,
   address:document.getElementById("address").value,
   certificate:document.getElementById("certificate").value,
   bank:document.getElementById("bank").value,
   account:document.getElementById("account").value,
   holder:document.getElementById("holder").value
 };
 localStorage.setItem("tslaClients",JSON.stringify(arr));
 load();
 toggleEdit();
}
function removeClient(){
 const id=String(localStorage.getItem("tslaCurrentClientId")||"");
 if(!confirm("Delete client?"))return;
 const arr=JSON.parse(localStorage.getItem("tslaClients")||"[]").filter(x=>String(x.id)!==id);
 localStorage.setItem("tslaClients",JSON.stringify(arr));
 localStorage.removeItem("tslaCurrentClientId");
 location.href="clients.html";
}
load();
</script></body></html>
