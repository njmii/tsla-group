<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancellation Form Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#f7f8fa;
color:#111;
}

.header{
position:sticky;
top:0;
background:white;
border-bottom:1px solid #eee;
padding:4px 12px;
z-index:100;
min-height:55px;
display:flex;
align-items:center;
justify-content:center;
}

.logo{
width:50px;
height:auto;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.back{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
color:#ff7a00;
font-weight:700;
}

.card{
background:white;
padding:24px;
border-radius:24px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
margin-bottom:20px;
}

.title{
font-size:1.8rem;
font-weight:900;
margin-bottom:8px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

.row{
margin-bottom:16px;
}

.label{
font-weight:700;
color:#666;
margin-bottom:6px;
display:block;
}

.value{
font-size:1rem;
font-weight:600;
}

.input{
width:100%;
padding:15px;
border-radius:16px;
border:2px solid #eee;
font-size:16px;
outline:none;
margin-bottom:12px;
}

.input:focus{
border-color:#ff7a00;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-weight:700;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.primary{
background:#ff7a00;
color:white;
}

.secondary{
background:#25D366;
color:white;
}

.notice{
background:#fff3e8;
padding:18px;
border-radius:18px;
margin-top:15px;
line-height:1.6;
}

</style>

<script src="https://unpkg.com/pdf-lib"></script>

</head>

<body>

<div class="header">

<img
src="https://njmii.github.io/tsla-group/assets/tslalogo.png"
class="logo">

</div>

<div class="container">

<a
href="index.html"
class="back">

← Home

</a>

<div class="card">

<div class="title">

📄 Cancellation Form Generator

</div>

<div class="subtitle">

Client data loaded automatically from Client Profile.

</div>

<div class="row">
<div class="label">Customer Name</div>
<div class="value" id="name">-</div>
</div>

<div class="row">
<div class="label">IC Number</div>
<div class="value" id="ic">-</div>
</div>

<div class="row">
<div class="label">Phone Number</div>
<div class="value" id="phone">-</div>
</div>

<div class="row">
<div class="label">Certificate Number</div>
<div class="value" id="certificate">-</div>
</div>

<div class="row">
<div class="label">Bank Name</div>
<div class="value" id="bank">-</div>
</div>

<div class="row">
<div class="label">Account Number</div>
<div class="value" id="account">-</div>
</div>

<div class="row">
<div class="label">Account Holder</div>
<div class="value" id="holder">-</div>
</div>

</div>

<div class="card">

<div class="title">

Additional Information

</div>

<div
style="
display:flex;
gap:10px;
margin-bottom:12px;
">

<input
class="input"
id="date"
placeholder="Date (DD/MM/YYYY)"
style="
margin-bottom:0;
flex:1;
">

<button
class="btn secondary"
type="button"
style="
width:auto;
margin-top:0;
padding:0 20px;
white-space:nowrap;
"
onclick="setToday()">

📅 Today

</button>

</div>

<input
class="input"
id="witnessName"
placeholder="Witness Name">

<input
class="input"
id="witnessIc"
placeholder="Witness IC">

<input
class="input"
id="agentName"
placeholder="Agent Name">

<input
class="input"
id="agentIc"
placeholder="Agent IC">

<input
class="input"
id="agentCode"
placeholder="Agent Code">

<button
class="btn secondary"
onclick="shareWhatsApp()">

📲 Share WhatsApp

</button>

<button
class="btn primary"
id="generateBtn"
onclick="testFwdPdf()">

📄 Generate Cancellation Form

</button>

<div
class="notice"
id="output">

✅ Ready to Generate Cancellation Form

</div>
</div>

<script>

const client =
JSON.parse(
localStorage.getItem("tslaClient")
);

if(client){

document.getElementById("name").innerText =
client.name || "-";

document.getElementById("ic").innerText =
client.ic || "-";

document.getElementById("phone").innerText =
client.phone || "-";

document.getElementById("certificate").innerText =
client.certificate || "-";

document.getElementById("bank").innerText =
client.bank || "-";

document.getElementById("account").innerText =
client.account || "-";

document.getElementById("holder").innerText =
client.holder || "-";

}


function shareWhatsApp(){

const text =

`Cancellation Request

Customer:
${client?.name || "-"}

Certificate:
${client?.certificate || "-"}

IC:
${client?.ic || "-"}

Date:
${document.getElementById("date").value || "-"}

Witness:
${document.getElementById("witnessName").value || "-"}

Generated via TSLA`;

window.open(

"https://wa.me/?text="+
encodeURIComponent(text),

"_blank"

);

}

function setToday(){

const today =
new Date();

const day =
String(today.getDate()).padStart(2,"0");

const month =
String(today.getMonth()+1).padStart(2,"0");

const year =
today.getFullYear();

document.getElementById("date").value =
`${day}/${month}/${year}`;

}

async function testFwdPdf(){

const { PDFDocument } = PDFLib;

const existingPdfBytes =
await fetch(
"./assets/fwd-cancellation.pdf"
).then(
res => res.arrayBuffer()
);

try{

const pdfDoc =
await PDFDocument.load(
existingPdfBytes,
{
ignoreEncryption:true
}
);

const pages =
pdfDoc.getPages();

const page =
pages[0];

const page2 =
pages[1];

const page6 =
pages[5];

const date =
document.getElementById("date").value;

const witnessName =
document.getElementById("witnessName").value;

const witnessIc =
document.getElementById("witnessIc").value;

const agentName =
document.getElementById("agentName").value;

const agentIc =
document.getElementById("agentIc").value;

const agentCode =
document.getElementById("agentCode").value;

function tickBox(target,x,y){

target.drawText(
"X",
{
x:x,
y:y,
size:14
}
);

}

// ======================
// PAGE 1
// ======================

page.drawText(
client?.certificate || "",
{
x:120,
y:675,
size:12
}
);

page.drawText(
client?.name || "",
{
x:400,
y:675,
size:12
}
);

tickBox(
page,
47,
354
);

tickBox(
page,
47,
240
);

// ======================
// PAGE 2
// ======================

page2.drawText(
"DIRECT CREDIT",
{
x:220,
y:625,
size:12
}
);

page2.drawText(
client?.holder || "",
{
x:220,
y:600,
size:12
}
);

page2.drawText(
client?.bank || "",
{
x:220,
y:580,
size:12
}
);

page2.drawText(
client?.account || "",
{
x:220,
y:560,
size:12
}
);
// ======================
// PAGE 6
// ======================

// Certificate Owner

page6.drawText(
client?.name || "",
{
x:110,
y:325,
size:11
}
);

page6.drawText(
client?.ic || "",
{
x:130,
y:310,
size:11
}
);

page6.drawText(
date,
{
x:110,
y:295,
size:10
}
);

// Tick "I have advised..."

tickBox(
page6,
38,
258
);

// Witness

page6.drawText(
witnessName,
{
x:410,
y:330,
size:11
}
);

page6.drawText(
witnessIc,
{
x:430,
y:310,
size:11
}
);

page6.drawText(
date,
{
x:410,
y:300,
size:10
}
);

// Agent

page6.drawText(
agentName,
{
x:110,
y:162,
size:11
}
);

page6.drawText(
agentIc,
{
x:110,
y:150,
size:11
}
);

page6.drawText(
date,
{
x:110,
y:130,
size:11
}
);

page6.drawText(
agentCode,
{
x:90,
y:110,
size:11
}
);

const pdfBytes =
await pdfDoc.save();

const blob =
new Blob(
[pdfBytes],
{
type:"application/pdf"
}
);

const url =
URL.createObjectURL(
blob
);

const a =
document.createElement(
"a"
);

a.href =
url;

a.download =
"fwd-cancellation.pdf";

a.click();

}
catch(err){

alert(
String(err)
);

}

}

</script>

</body>

</html>
