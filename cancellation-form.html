<script src="https://unpkg.com/pdf-lib">
function renderClientPicker(){
 const box=document.getElementById('clientPicker');
 if(!box)return;
 const allClients=JSON.parse(localStorage.getItem('tslaClients')||'[]');
 const current=getCurrentClient();
 const q=(document.getElementById('clientSearch')?.value||'').toLowerCase().trim();
 let list=q?allClients.filter(c=>
 ((c.name||'')+' '+(c.ic||'')+' '+(c.phone||'')).toLowerCase().includes(q)
):(current?[current,...allClients.filter(x=>x.id!==current.id)].slice(0,3):allClients.slice(0,3));
 box.innerHTML='';
 list.forEach(c=>{
   const d=document.createElement('div');
   d.style='padding:10px;border:1px solid #eee;border-radius:12px;margin:8px 0';
   d.innerHTML='<b>'+(c.name||'-')+'</b><br><small>'+(c.ic||'')+'</small>';
   const b=document.createElement('button');
   b.className='btn secondary';
   b.textContent='Use';
   b.onclick=()=>{localStorage.setItem('tslaCurrentClientId',String(c.id));location.reload();};
   d.appendChild(b);
   box.appendChild(d);
 });
}


function emailCancellation(){
const to="policyservicing.my@fwd.com";
const subject=encodeURIComponent(`Cancellation Request - ${client?.name||"-"} - ${client?.certificate||"-"}`);
const body=encodeURIComponent(`Dear Policy Servicing Team,

Please process the cancellation request for the following policy:

Name: ${client?.name||"-"}
IC: ${client?.ic||"-"}
Certificate Number: ${client?.certificate||"-"}

Thank you.

Regards,`);
window.location.href=`mailto:${to}?subject=${subject}&body=${body}`;
}


function initPad(id){
 const c=document.getElementById(id);const x=c.getContext('2d');let d=false;
 function pos(e){const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*c.width/r.width,y:(t.clientY-r.top)*c.height/r.height};}
 ['mousedown','touchstart'].forEach(ev=>c.addEventListener(ev,e=>{d=true;let p=pos(e);x.beginPath();x.moveTo(p.x,p.y);e.preventDefault();}));
 ['mousemove','touchmove'].forEach(ev=>c.addEventListener(ev,e=>{if(!d)return;let p=pos(e);x.lineTo(p.x,p.y);x.stroke();e.preventDefault();}));
 ['mouseup','mouseleave','touchend'].forEach(ev=>c.addEventListener(ev,()=>d=false));
}
function clearPad(id){const c=document.getElementById(id);c.getContext('2d').clearRect(0,0,c.width,c.height);}
window.addEventListener('load',()=>{
 initPad('witnessPad');initPad('agentPad');
 const cl=getCurrentClient();
 if(cl&&cl.signature){document.getElementById('clientSigPreview').src=cl.signature;}
});
</script>

async function testFwdPdf(){

// === TSLA v3.0.3 Signature Embed ===

async function makeTransparent(data){
 const img=new Image();
 await new Promise(r=>{img.onload=r;img.src=data;});
 const c=document.createElement('canvas');
 c.width=img.width;c.height=img.height;
 const ctx=c.getContext('2d');
 ctx.drawImage(img,0,0);
 const d=ctx.getImageData(0,0,c.width,c.height);
 for(let i=0;i<d.data.length;i+=4){
  if(d.data[i]>235&&d.data[i+1]>235&&d.data[i+2]>235)d.data[i+3]=0;
 }
 ctx.putImageData(d,0,0);
 return c.toDataURL('image/png');
}

async function drawSig(page,pdf,data,x,y,maxW,maxH){
 if(!data)return;
 try{
  data=await makeTransparent(data);
  const img=await pdf.embedPng(data);
  const r=img.width/img.height;
  let w=maxW,h=maxW/r;
  if(h>maxH){h=maxH;w=h*r;}
  page.drawImage(img,{x:x,y:y,width:w,height:h});
 }catch(e){}
}
