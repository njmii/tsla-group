<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancellation Form Generator</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
body{
background:#f7f8fa;
color:#111;
}
.header{
position:sticky;
top:0;
background:white;
border-bottom:1px solid #eee;
padding:4px 12px;
z-index:100;
min-height:55px;
display:flex;
align-items:center;
justify-content:center;
}
.logo{
width:50px;
height:auto;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.back{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
color:#ff7a00;
font-weight:700;
}
.card{
background:white;
padding:24px;
border-radius:24px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
margin-bottom:20px;
}
.title{
font-size:1.8rem;
font-weight:900;
margin-bottom:8px;
}
.subtitle{
color:#666;
margin-bottom:20px;
}
.row{
margin-bottom:16px;
}
.label{
font-weight:700;
color:#666;
margin-bottom:6px;
display:block;
}
.value{
font-size:1rem;
font-weight:600;
}
.input{
width:100%;
padding:15px;
border-radius:16px;
border:2px solid #eee;
font-size:16px;
outline:none;
}
.input:focus{
border-color:#ff7a00;
}
.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-weight:700;
font-size:16px;
cursor:pointer;
margin-top:10px;
}
.primary{
background:#ff7a00;
color:white;
}
.secondary{
background:#25D366;
color:white;
}
.notice{
background:#fff3e8;
padding:18px;
border-radius:18px;
margin-top:15px;
line-height:1.6;
}
</style>
<script src="https://unpkg.com/pdf-lib"></script>
</head>
<body>
<div class="header">
<img
src="https://njmii.github.io/tsla-group/assets/tslalogo.png"
class="logo">
</div>
<div class="container">
<a href="index.html" class="back">
← Home
</a>
<div class="card">
<div class="title">
📄 Cancellation Form Generator
</div>
<div class="subtitle">
Client data loaded automatically from Client Profile.
</div>
<div class="row">
<div class="label">Customer Name</div>
<div class="value" id="name">-</div>
</div>
<div class="row">
<div class="label">IC Number</div>
<div class="value" id="ic">-</div>
</div>
<div class="row">
<div class="label">Phone Number</div>
<div class="value" id="phone">-</div>
</div>
<div class="row">
<div class="label">Certificate Number</div>
<div class="value" id="certificate">-</div>
</div>
<div class="row">
<div class="label">Bank Name</div>
<div class="value" id="bank">-</div>
</div>
<div class="row">
<div class="label">Account Number</div>
<div class="value" id="account">-</div>
</div>
<div class="row">
<div class="label">Account Holder</div>
<div class="value" id="holder">-</div>
</div>
</div>
<div class="card">
<div class="title">
Cancellation Details
</div>
<input
class="input"
id="reason"
placeholder="Reason for cancellation">
<button
class="btn primary"
onclick="generateForm()">
📄 Generate Form
</button>
<button
class="btn secondary"
onclick="shareWhatsApp()">
📲 Share WhatsApp
</button>

<button
class="btn primary"
onclick="downloadPDF()">
⬇ Download PDF
</button>

<button
class="btn secondary"
onclick="testFwdPdf()">
🧪 Test FWD Overlay
</button>
<div
class="notice"
id="output">
Waiting for generation...
</div>
</div>
</div>
<script>
const client =
JSON.parse(
localStorage.getItem("tslaClient")
);
if(client){
document.getElementById("name").innerText =
client.name || "-";
document.getElementById("ic").innerText =
client.ic || "-";
document.getElementById("phone").innerText =
client.phone || "-";
document.getElementById("certificate").innerText =
client.certificate || "-";
document.getElementById("bank").innerText =
client.bank || "-";
document.getElementById("account").innerText =
client.account || "-";
document.getElementById("holder").innerText =
client.holder || "-";
}
function generateForm(){
const reason =
document.getElementById("reason").value;
document.getElementById("output").innerHTML =
`
<b>Certificate No:</b>
${client?.certificate || "-"}
<br><br>
<b>Customer:</b>
${client?.name || "-"}
<br><br>
<b>IC:</b>
${client?.ic || "-"}
<br><br>
<b>Bank:</b>
${client?.bank || "-"}
<br><br>
<b>Account:</b>
${client?.account || "-"}
<br><br>
<b>Reason:</b>
${reason || "-"}
<br><br>
✅ Ready for PDF generation
`;
}
function shareWhatsApp(){
const reason =
document.getElementById("reason").value;
const text =
`Cancellation Request
Customer:
${client?.name || "-"}
Certificate:
${client?.certificate || "-"}
IC:
${client?.ic || "-"}
Reason:
${reason || "-"}
Generated via TSLA`;
window.open(
"https://wa.me/?text=" +
encodeURIComponent(text),
"_blank"
);
}

async function downloadPDF(){
alert("Button Works");
const { PDFDocument } = PDFLib;
const pdfDoc =
await PDFDocument.create();
alert("PDF Created");
const page =
pdfDoc.addPage([595,842]);
page.drawText(
client?.name || "NO NAME",
{
x:50,
y:750,
size:18
}
);
const pdfBytes =
await pdfDoc.save();
const blob =
new Blob(
[pdfBytes],
{type:"application/pdf"}
);
const url =
URL.createObjectURL(blob);
const a =
document.createElement("a");
a.href = url;
a.download =
"test.pdf";
a.click();
alert("Download Started");
}
async function testFwdPdf(){

alert("FWD Overlay Button Works");

}

</script>
</body>
</html>
