<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>client-signature.html FIX v1.0.3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Segoe UI,sans-serif}
body{background:#f7f8fa;padding:20px}.container{max-width:900px;margin:auto}
.card{background:#fff;padding:24px;border-radius:22px;box-shadow:0 4px 20px rgba(0,0,0,.05);margin-bottom:20px}
.preview{width:100%;height:220px;border:2px dashed #ccc;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:repeating-conic-gradient(#eee 0% 25%,#fff 0% 50%) 0 0/20px 20px}
.preview img{max-width:100%;max-height:100%}
.btn{width:100%;padding:16px;border:none;border-radius:16px;background:#ff7a00;color:#fff;font-weight:700;margin-top:14px;cursor:pointer}
input[type=file],input[type=range]{width:100%;margin-top:12px}
.small{color:#777;text-align:center;margin-top:8px}
.slider-label{display:flex;justify-content:space-between;font-size:13px;color:#999;margin-top:4px}
#bgColorRow{display:flex;align-items:center;gap:10px;margin-top:12px}
#bgColorRow label{font-size:13px;color:#555;white-space:nowrap}
#bgColor{width:48px;height:36px;border:none;border-radius:8px;cursor:pointer;padding:2px}
#bgColorHex{font-size:13px;color:#777}
</style></head><body>
<div class="container">
<div class="card"><h1>✍️ Client Signature</h1>
<div id="clientName"></div><div id="clientIc"></div></div>

<div class="card">
  <p style="font-weight:600;margin-bottom:8px">Original</p>
  <div class="preview"><img id="originalPreview"></div>
  <input id="upload" type="file" accept="image/*">
</div>

<div class="card">
  <p style="font-weight:600;margin-bottom:8px">Processed (transparent background)</p>
  <div class="preview"><img id="processedPreview"></div>

  <div id="bgColorRow">
    <label>Background colour:</label>
    <input type="color" id="bgColor" value="#ffffff">
    <span id="bgColorHex">#ffffff</span>
    <button style="padding:6px 12px;border:none;border-radius:8px;background:#eee;font-size:12px;cursor:pointer" onclick="pickFromCorner()">🎯 Auto-detect</button>
  </div>

  <p style="margin-top:14px;font-size:13px;color:#555">Tolerance (how similar a pixel must be to background colour)</p>
  <input id="sensitivity" type="range" min="10" max="120" value="40">
  <div class="slider-label"><span>Strict</span><span>Aggressive</span></div>

  <button class="btn" onclick="removeBg()">🪄 Remove Background</button>
  <button class="btn" onclick="saveSig()">💾 Save to Client</button>
  <button class="btn" onclick="downloadPNG()">📥 Download PNG</button>
  <div class="small" id="status"></div>
</div>

<button class="btn" onclick="location.href='client-profile.html'">⬅ Back to Client</button>
<button class="btn" onclick="location.href='cancellation-form.html'">📄 Go to FWD Cancellation Form</button>
</div>

<script>
function current(){
  const id=String(localStorage.getItem("tslaCurrentClientId")||"");
  const arr=JSON.parse(localStorage.getItem("tslaClients")||"[]");
  return arr.find(x=>String(x.id)===id)||null;
}

let processed="";
let originalBase64="";
let offscreenCanvas=null; // keep decoded pixels for auto-detect

const c=current();
if(c){
  document.getElementById("clientName").textContent=c.name||"-";
  document.getElementById("clientIc").textContent=c.ic||"-";
  if(c.signature){
    processed=c.signature;
    originalBase64=c.signature;
    document.getElementById("processedPreview").src=processed;
    document.getElementById("status").textContent="✅ Existing signature loaded";
  }
}

document.getElementById("upload").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async()=>{
    originalBase64=r.result;
    document.getElementById("originalPreview").src=r.result;
    document.getElementById("processedPreview").src=r.result;
    processed=r.result;
    document.getElementById("status").textContent="📁 Image loaded. Auto-detecting background colour...";
    await buildOffscreen();
    pickFromCorner();
    document.getElementById("status").textContent="📁 Image loaded. Background colour auto-detected.";
  };
  r.readAsDataURL(f);
};

async function buildOffscreen(){
  const img=new Image();
  img.src=originalBase64;
  await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;});
  offscreenCanvas=document.createElement("canvas");
  offscreenCanvas.width=img.naturalWidth;
  offscreenCanvas.height=img.naturalHeight;
  offscreenCanvas.getContext("2d").drawImage(img,0,0);
}

// Sample the 4 corners and pick the most common colour
function pickFromCorner(){
  if(!offscreenCanvas)return;
  const ctx=offscreenCanvas.getContext("2d");
  const w=offscreenCanvas.width, h=offscreenCanvas.height;
  const corners=[
    ctx.getImageData(0,0,1,1).data,
    ctx.getImageData(w-1,0,1,1).data,
    ctx.getImageData(0,h-1,1,1).data,
    ctx.getImageData(w-1,h-1,1,1).data
  ];
  // Average the corners
  const avg=corners.reduce((a,c)=>[a[0]+c[0],a[1]+c[1],a[2]+c[2]],[0,0,0]).map(v=>Math.round(v/4));
  const hex="#"+avg.map(v=>v.toString(16).padStart(2,"0")).join("");
  document.getElementById("bgColor").value=hex;
  document.getElementById("bgColorHex").textContent=hex;
}

document.getElementById("bgColor").oninput=e=>{
  document.getElementById("bgColorHex").textContent=e.target.value;
};

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}

// Euclidean colour distance in RGB space
function colorDist(r1,g1,b1,r2,g2,b2){
  return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);
}

async function removeBg(){
  const status=document.getElementById("status");
  if(!originalBase64){status.textContent="⚠️ Please upload an image first.";return;}
  status.textContent="⏳ Removing background...";

  if(!offscreenCanvas) await buildOffscreen();

  const canvas=document.createElement("canvas");
  canvas.width=offscreenCanvas.width;
  canvas.height=offscreenCanvas.height;
  const ctx=canvas.getContext("2d");
  ctx.drawImage(offscreenCanvas,0,0);

  const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const data=imageData.data;

  const [br,bg,bb]=hexToRgb(document.getElementById("bgColor").value);
  const tolerance=parseInt(document.getElementById("sensitivity").value);

  for(let i=0;i<data.length;i+=4){
    const dist=colorDist(data[i],data[i+1],data[i+2],br,bg,bb);
    if(dist<=tolerance) data[i+3]=0;
  }

  ctx.putImageData(imageData,0,0);
  processed=canvas.toDataURL("image/png");
  document.getElementById("processedPreview").src=processed;
  status.textContent="✅ Background removed!";
}

function saveSig(){
  const id=String(localStorage.getItem("tslaCurrentClientId")||"");
  let arr=JSON.parse(localStorage.getItem("tslaClients")||"[]");
  const idx=arr.findIndex(x=>String(x.id)===id);
  if(idx<0||!processed){alert("Client or signature missing");return;}
  arr[idx].signature=processed;
  arr[idx].updatedAt=new Date().toLocaleString();
  localStorage.setItem("tslaClients",JSON.stringify(arr));
  document.getElementById("status").textContent="✅ Signature saved";
}

function downloadPNG(){
  if(!processed)return;
  const a=document.createElement("a");
  a.href=processed;a.download="signature-transparent.png";a.click();
}
</script>
</body></html>
