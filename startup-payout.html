<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Payout — TSLA Digital Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
body{background:#f7f8fa;color:#111;}
.header{position:sticky;top:0;background:white;border-bottom:1px solid #eee;padding:4px 12px;z-index:100;min-height:55px;display:flex;align-items:center;justify-content:center;}
.logo{width:50px;height:auto;}
.container{max-width:600px;margin:auto;padding:20px;}
.back{display:inline-block;margin-bottom:15px;text-decoration:none;color:#ff7a00;font-weight:700;}
.title{font-size:1.8rem;font-weight:900;margin-bottom:4px;}
.subtitle{color:#888;font-size:.9rem;margin-bottom:24px;}
.card{background:white;padding:24px;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.05);margin-bottom:16px;}
.card h3{font-size:1rem;font-weight:800;margin-bottom:16px;color:#333;}
.row{margin-bottom:14px;}
.label{font-weight:700;color:#666;margin-bottom:6px;display:block;font-size:.85rem;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-wrap input{width:100%;padding:14px 16px;border-radius:16px;border:2px solid #eee;font-size:1rem;color:#111;background:white;appearance:none;-webkit-appearance:none;}
.input-wrap input:focus{outline:none;border-color:#ff7a00;}
.has-prefix input{padding-left:44px;}
.has-suffix input{padding-right:40px;}
.prefix{position:absolute;left:15px;color:#888;font-weight:700;pointer-events:none;}
.suffix{position:absolute;right:15px;color:#888;font-weight:700;pointer-events:none;}
.result-amount{font-size:2.8rem;font-weight:900;text-align:center;margin:8px 0 4px;}
.result-label{text-align:center;color:#888;font-size:.85rem;margin-bottom:16px;}
.breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f2f2f2;font-size:.92rem;}
.breakdown-row:last-child{border:none;font-weight:800;font-size:1rem;padding-top:14px;}
.breakdown-row span:first-child{color:#555;}
.tag{display:inline-block;background:#f0f0f0;color:#555;border-radius:8px;font-size:.7rem;font-weight:700;padding:2px 7px;margin-left:6px;vertical-align:middle;}
.warn-banner{border-radius:16px;padding:16px 18px;margin-bottom:16px;}
.warn-title{font-weight:800;font-size:.92rem;margin-bottom:4px;}
.warn-body{font-size:.85rem;line-height:1.5;}
.chip{display:inline-flex;align-items:center;gap:6px;border-radius:10px;padding:8px 16px;font-weight:700;font-size:.9rem;}
.hint{font-size:.78rem;color:#aaa;margin-top:5px;}
</style>
</head>
<body>

<div class="header">
  <img src="assets/tslalogo.png" class="logo" alt="TSLA">
</div>

<div class="container">
  <a href="javascript:history.back()" class="back">← Back</a>
  <div class="title">Startup Payout</div>
  <div class="subtitle">FWD Elite Agent Startup Scheme Calculator</div>

  <div class="card">
    <h3>📋 Scheme Details</h3>
    <div class="row">
      <label class="label">Scheme Amount</label>
      <div class="input-wrap has-prefix">
        <span class="prefix">RM</span>
        <input type="number" id="scheme" placeholder="e.g. 10000" min="0" oninput="calc()">
      </div>
    </div>
    <div class="row">
      <label class="label">Collection Efficiency (CE)</label>
      <div class="input-wrap has-suffix">
        <input type="number" id="ce" placeholder="e.g. 85" min="0" max="100" step="0.1" oninput="calc()">
        <span class="suffix">%</span>
      </div>
    </div>
    <div class="row">
      <label class="label">PR13 — 13th Month Persistency</label>
      <div class="input-wrap has-suffix">
        <input type="number" id="pr13" placeholder="0" min="0" max="100" step="0.1" oninput="calc()">
        <span class="suffix">%</span>
      </div>
      <div class="hint">Enter 0 if you are a 1st year agent (PR13 not yet applicable)</div>
    </div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <div id="clawWarn"></div>

    <div class="result-label">Final Payout</div>
    <div class="result-amount" id="finalAmt">RM 0</div>

    <div style="text-align:center;margin-bottom:20px" id="yebStatus"></div>

    <div id="breakdown"></div>
  </div>
</div>

<script>
function fmt(n){return 'RM '+(Math.round(n)).toLocaleString('en-MY');}

function calc(){
  const schemeRaw=document.getElementById('scheme').value;
  const ceRaw=document.getElementById('ce').value;
  const pr13Raw=document.getElementById('pr13').value;
  const card=document.getElementById('resultCard');

  if(!schemeRaw||!ceRaw){card.style.display='none';return;}

  const scheme=parseFloat(schemeRaw);
  const ce=parseFloat(ceRaw);
  if(isNaN(scheme)||scheme<=0||isNaN(ce)||ce<0||ce>100){card.style.display='none';return;}

  const pr13=pr13Raw===''?0:parseFloat(pr13Raw);
  const firstYear=pr13===0;

  // CE multiplier
  let ceMult,ceLabel,ceColor;
  if(ce>=85){ceMult=1;ceLabel='100%';ceColor='#0a9b43';}
  else if(ce>=80){ceMult=0.8;ceLabel='80%';ceColor='#c77700';}
  else{ceMult=0;ceLabel='0%';ceColor='#e53935';}

  // PR13 multiplier
  let pr13Mult=null,pr13Label='',pr13Color='#888';
  if(!firstYear){
    if(pr13>=80){pr13Mult=1;pr13Label='100%';pr13Color='#0a9b43';}
    else if(pr13>=70){pr13Mult=0.75;pr13Label='75%';pr13Color='#c77700';}
    else if(pr13>=60){pr13Mult=0.5;pr13Label='50%';pr13Color='#e56d00';}
    else{pr13Mult=0;pr13Label='0%';pr13Color='#e53935';}
  }

  // Final payout
  const payout=pr13Mult!==null?scheme*ceMult*pr13Mult:scheme*ceMult;
  const payColor=payout>0?'#ff7a00':'#e53935';

  // Claw back (show if PR13 > 0 and PR13 < 80)
  let clawPct=null,clawSevere=false;
  if(!firstYear&&pr13<80){
    if(pr13<60){clawPct='100%';clawSevere=true;}
    else if(pr13<65){clawPct='25%';}
    else if(pr13<70){clawPct='20%';}
    else if(pr13<75){clawPct='15%';}
    else{clawPct='10%';}
  }

  // Year-end bonus eligibility
  const yeb=ce>=85;

  // Render: claw back warning
  document.getElementById('clawWarn').innerHTML=clawPct
    ?`<div class="warn-banner" style="background:${clawSevere?'#ffebee':'#fff8e1'};border-left:4px solid ${clawSevere?'#e53935':'#f59e0b'}">
        <div class="warn-title" style="color:${clawSevere?'#e53935':'#b45309'}">⚠️ Claw Back Warning</div>
        <div class="warn-body" style="color:${clawSevere?'#c62828':'#78350f'}">PR13 of ${pr13}% triggers a <b>${clawPct}</b> claw back on payout received.</div>
      </div>`
    :'';

  // Final amount
  document.getElementById('finalAmt').textContent=fmt(payout);
  document.getElementById('finalAmt').style.color=payColor;

  // YEB status
  document.getElementById('yebStatus').innerHTML=
    `<span class="chip" style="background:${yeb?'#e8f5e9':'#ffebee'};color:${yeb?'#0a9b43':'#e53935'}">
      ${yeb?'✅ Year-End Bonus Eligible':'❌ Not Eligible for Year-End Bonus'}
    </span>`;

  // Breakdown rows
  let h='';
  h+=`<div class="breakdown-row"><span>Scheme Amount</span><span style="font-weight:700">${fmt(scheme)}</span></div>`;
  h+=`<div class="breakdown-row">
    <span>CE Multiplier</span>
    <span style="color:${ceColor};font-weight:700">${ceLabel}<span class="tag">CE ${ce}%</span></span>
  </div>`;
  if(firstYear){
    h+=`<div class="breakdown-row">
      <span>PR13 Multiplier</span>
      <span style="color:#aaa;font-style:italic;font-size:.88rem">N/A — 1st year agent</span>
    </div>`;
  }else{
    h+=`<div class="breakdown-row">
      <span>PR13 Multiplier</span>
      <span style="color:${pr13Color};font-weight:700">${pr13Label}<span class="tag">PR13 ${pr13}%</span></span>
    </div>`;
  }
  h+=`<div class="breakdown-row"><span>Final Payout</span><span style="color:${payColor};font-weight:900">${fmt(payout)}</span></div>`;
  document.getElementById('breakdown').innerHTML=h;

  card.style.display='block';
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}
</script>
</body>
</html>
