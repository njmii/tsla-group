<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BL714 — TSLA Digital Hub</title>
<script src="assets/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.3/dist/signature_pad.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
body{background:#f7f8fa;color:#111;}
.header{position:sticky;top:0;background:white;border-bottom:1px solid #eee;padding:4px 12px;z-index:100;min-height:55px;display:flex;align-items:center;justify-content:center;}
.logo{width:50px;height:auto;}
.container{max-width:900px;margin:auto;padding:20px;}
.back{display:inline-block;margin-bottom:15px;text-decoration:none;color:#ff7a00;font-weight:700;}
.title{font-size:1.8rem;font-weight:900;margin-bottom:4px;}
.subtitle{color:#666;margin-bottom:20px;font-size:.95rem;}
.card{background:white;padding:24px;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.05);margin-bottom:20px;}
.card h3{font-size:1.1rem;font-weight:800;margin-bottom:16px;}
.row{margin-bottom:14px;}
.label{font-weight:700;color:#666;margin-bottom:6px;display:block;font-size:.85rem;}
input,select{width:100%;padding:14px 16px;border-radius:16px;border:2px solid #eee;font-size:1rem;color:#111;background:white;appearance:none;}
input:focus,select:focus{outline:none;border-color:#ff7a00;}
input[readonly]{background:#f7f8fa;color:#555;}
.sig-wrap{border:2px solid #eee;border-radius:16px;overflow:hidden;background:white;cursor:crosshair;}
canvas{width:100%;height:160px;display:block;}
.btn{background:#ff7a00;color:white;padding:16px;border-radius:16px;border:0;width:100%;font-size:1rem;font-weight:700;cursor:pointer;}
.btn:hover{background:#e56d00;}
.btn:disabled{opacity:.6;cursor:default;}
.btn-sm{background:transparent;color:#ff7a00;border:2px solid #ff7a00;padding:8px 18px;border-radius:12px;font-weight:700;cursor:pointer;font-size:.85rem;margin-top:8px;}
#pc{display:none;}
</style>
</head>
<body>

<div class="header">
  <img src="assets/tslalogo.png" class="logo" alt="TSLA">
</div>

<div class="container">
  <a href="javascript:history.back()" class="back">← Back</a>
  <div class="title">BL714</div>
  <div class="subtitle">Borang Serahan / Pembatalan Sijil</div>

  <div class="card">
    <h3>Certificate Owner</h3>
    <div class="row">
      <label class="label">Name</label>
      <input id="owner" readonly placeholder="Owner name">
    </div>
    <div class="row">
      <label class="label">IC Number</label>
      <input id="ownerIc" readonly placeholder="IC number">
    </div>
    <div class="row">
      <label class="label">Certificate Number</label>
      <input id="certNo" readonly placeholder="Certificate number">
    </div>
    <div class="row">
      <label class="label">Bank</label>
      <input id="bank" readonly placeholder="Bank name">
    </div>
    <div class="row">
      <label class="label">Account Number</label>
      <input id="acct" readonly placeholder="Account number">
    </div>
    <div class="row">
      <label class="label">ETIQA POLICY NO</label>
      <input id="noPolisi" placeholder="Etiqa policy number">
    </div>
    <div class="row">
      <label class="label">Date</label>
      <input type="date" id="sigDate">
    </div>
    <div class="row">
      <label class="label">Person Covered</label>
      <select id="mode">
        <option>Same as Certificate Owner</option>
        <option>Different Person</option>
      </select>
    </div>
    <div id="pc">
      <div class="row">
        <label class="label">Person Covered — Name</label>
        <input id="pcName" placeholder="Full name">
      </div>
      <div class="row">
        <label class="label">Person Covered — IC</label>
        <input id="pcIc" placeholder="IC number">
      </div>
      <div class="row">
        <label class="label">Person Covered — Phone</label>
        <input id="pcPhone" placeholder="Phone number">
      </div>
      <div class="row">
        <label class="label">Person Covered — Address</label>
        <input id="pcAddress" placeholder="Current address">
      </div>
      <div class="row">
        <label class="label">Person Covered — Signature</label>
        <div class="sig-wrap">
          <canvas id="pcSig"></canvas>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn-sm" onclick="clearPcSig()">Clear</button>
          <label class="btn-sm" style="cursor:pointer;display:inline-flex;align-items:center;">
            Upload Signature
            <input type="file" id="pcSigFile" accept="image/*" style="display:none" onchange="uploadPcSig(this)">
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="card" id="staffCard">
    <div id="witnessStatus" style="font-size:.95rem;margin-bottom:6px">⚪ No witness saved</div>
    <a href="clients.html" style="font-size:.8rem;color:#ff7a00;text-decoration:none">⚙️ Set up in Settings →</a>
  </div>

  <div class="card">
    <button id="generateBtn" class="btn" onclick="generateBL714()">Generate Official PDF</button>
  </div>
</div>

<script>
function getCurrentClient() {
  const id = localStorage.getItem("tslaCurrentClientId");
  const clients = JSON.parse(localStorage.getItem("tslaClients") || "[]");
  return clients.find(c => String(c.id) === String(id)) || {};
}
const c = getCurrentClient();
document.getElementById("owner").value   = c.name        || "";
document.getElementById("ownerIc").value = c.ic          || "";
document.getElementById("certNo").value  = c.certificate || "";
document.getElementById("bank").value    = c.bank        || "";
document.getElementById("acct").value    = c.account     || "";
document.getElementById("sigDate").value = new Date().toISOString().split("T")[0];

document.getElementById("mode").onchange = function() {
  document.getElementById("pc").style.display = this.selectedIndex ? "block" : "none";
};

const _w = JSON.parse(localStorage.getItem("tslaWitness") || "{}");
document.getElementById("witnessStatus").innerHTML = _w.name
  ? `<span style="color:#0a9b43">✅ Witness: <b>${_w.name}</b></span>`
  : `<span style="color:#c77700">⚪ No witness saved</span>`;

const pcSigCanvas = document.getElementById("pcSig");
pcSigCanvas.width  = pcSigCanvas.offsetWidth || 600;
pcSigCanvas.height = 160;
const pcPad = new SignaturePad(pcSigCanvas, { penColor: "#111" });
let pcUploadedSig = null;

function clearPcSig() { pcPad.clear(); pcUploadedSig = null; }

async function uploadPcSig(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = async e => {
    pcUploadedSig = await makeTransparent(e.target.result);
    const img = new Image();
    img.onload = () => {
      pcPad.clear();
      const scale = Math.min(pcSigCanvas.width / img.width, pcSigCanvas.height / img.height);
      const w = img.width * scale, h = img.height * scale;
      pcSigCanvas.getContext("2d").drawImage(img, (pcSigCanvas.width - w) / 2, (pcSigCanvas.height - h) / 2, w, h);
    };
    img.src = pcUploadedSig;
  };
  reader.readAsDataURL(input.files[0]);
}

// ── PDF helpers (same as cancellation-form.html) ───────────────────────────
async function makeTransparent(data) {
  const img = new Image();
  await new Promise(r => { img.onload = r; img.src = data; });
  const cv = document.createElement("canvas");
  cv.width = img.width; cv.height = img.height;
  const ctx = cv.getContext("2d");
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0, 0, cv.width, cv.height);
  for (let i = 0; i < d.data.length; i += 4) {
    if (d.data[i] > 235 && d.data[i+1] > 235 && d.data[i+2] > 235) d.data[i+3] = 0;
  }
  ctx.putImageData(d, 0, 0);
  return cv.toDataURL("image/png");
}

async function drawSig(page, pdf, data, x, y, maxW, maxH) {
  if (!data) return;
  try {
    data = await makeTransparent(data);
    const img = await pdf.embedPng(data);
    const r = img.width / img.height;
    let w = maxW, h = maxW / r;
    if (h > maxH) { h = maxH; w = h * r; }
    page.drawImage(img, { x, y, width: w, height: h });
  } catch(e) {}
}

// ── Word-wrap helper (max 2 lines, truncate to maxChars per line) ──────────
function wrapText(text, maxChars) {
  if (!text) return [""];
  if (text.length <= maxChars) return [text];
  const words = text.split(" ");
  const lines = [];
  let line = "";
  for (const word of words) {
    const candidate = line ? line + " " + word : word;
    if (candidate.length > maxChars) {
      if (line) lines.push(line);
      line = word.slice(0, maxChars);
    } else {
      line = candidate;
    }
  }
  if (line) lines.push(line);
  return lines.slice(0, 2);
}

// ── PDF generation ─────────────────────────────────────────────────────────
async function generateBL714() {
  const { PDFDocument } = PDFLib;
  const btn = document.getElementById("generateBtn");
  btn.disabled = true;
  btn.innerText = "⏳ Generating...";

  try {
    const bytes = await fetch("./assets/bl714form.pdf").then(r => r.arrayBuffer());
    const pdf   = await PDFDocument.load(bytes, { ignoreEncryption: true });
    const page  = pdf.getPages()[0];

    // Format date as DD/MM/YYYY
    const raw = document.getElementById("sigDate").value;
    const [yr, mo, dy] = raw ? raw.split("-") : ["","",""];
    const date = raw ? `${dy}/${mo}/${yr}` : "";

    const isDiff = document.getElementById("mode").selectedIndex === 1;

    // ── Header ────────────────────────────────────────────────────────────
    const noPolisi = document.getElementById("noPolisi").value;
    page.drawText(noPolisi,            { x: 100, y: 682, size: 11 });
    page.drawText(date,                 { x: 500, y: 682, size: 11 });

    // ── Bank account section ───────────────────────────────────────────────
    page.drawText(c.holder || c.name || "", { x: 120, y: 562, size: 10 });
    page.drawText(c.account || "",          { x: 320, y: 562, size: 10 });
    page.drawText(c.bank    || "",          { x: 330, y: 552, size: 10 });

    // ── Always tick Masalah Kewangan as reason ─────────────────────────────
    page.drawText("X", { x: 35, y: 297, size: 10 });

    // ── Pemilik Sijil (Certificate Owner) ─────────────────────────────────
    if (c.signature) {
      await drawSig(page, pdf, c.signature, 90, 477, 100, 20);
    }
    page.drawText(c.name  || "", { x: 90, y: 452, size: 10 });
    page.drawText(c.ic    || "", { x: 90, y: 432, size: 10 });
    page.drawText(c.phone || "", { x: 90, y: 417, size: 10 });
    const addrLines1 = wrapText(c.address || "", 28);
    if (addrLines1[0]) page.drawText(addrLines1[0], { x: 90, y: 402, size: 9 });
    if (addrLines1[1]) page.drawText(addrLines1[1], { x: 90, y: 392, size: 9 });

    // ── Orang Yang Dilindungi (Person Covered — only when different person) ───
    if (isDiff) {
      const n = document.getElementById("pcName").value;
      const i = document.getElementById("pcIc").value;
      const p = document.getElementById("pcPhone").value;
      const a = document.getElementById("pcAddress").value;
      const pcSigData = pcUploadedSig || (!pcPad.isEmpty() ? pcPad.toDataURL() : null);
      if (pcSigData) await drawSig(page, pdf, pcSigData, 200, 477, 100, 20);
      if (n) page.drawText(n, { x: 200, y: 452, size: 10 });
      if (i) page.drawText(i, { x: 200, y: 432, size: 10 });
      if (p) page.drawText(p, { x: 200, y: 417, size: 10 });
      const addrLines2 = wrapText(a, 22);
      if (addrLines2[0]) page.drawText(addrLines2[0], { x: 200, y: 402, size: 9 });
      if (addrLines2[1]) page.drawText(addrLines2[1], { x: 200, y: 392, size: 9 });
    }

    // ── Saksi (Witness) ────────────────────────────────────────────────────
    const w = JSON.parse(localStorage.getItem("tslaWitness") || "{}");
    if (w.signature) await drawSig(page, pdf, w.signature, 490, 477, 60, 20);
    if (w.name)    page.drawText(w.name,    { x: 490, y: 452, size: 9 });
    if (w.ic)      page.drawText(w.ic,      { x: 490, y: 432, size: 9 });
    if (w.phone)   page.drawText(w.phone,   { x: 490, y: 417, size: 9 });
    const addrLines3 = wrapText(w.address || "", 18);
    if (addrLines3[0]) page.drawText(addrLines3[0], { x: 490, y: 402, size: 9 });
    if (addrLines3[1]) page.drawText(addrLines3[1], { x: 490, y: 392, size: 9 });

    const out  = await pdf.save();
    const link = document.createElement("a");
    link.href     = URL.createObjectURL(new Blob([out], { type: "application/pdf" }));
    link.download = `BL714-${c.name || "form"}.pdf`;
    link.click();
  } catch(e) {
    alert("PDF generation failed: " + e.message);
  } finally {
    btn.disabled = false;
    btn.innerText = "Generate Official PDF";
  }
}
</script>
</body>
</html>
