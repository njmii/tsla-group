
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BL714</title>
<script src="assets/pdf-lib.min.js"></script>
<style>
body{margin:0;background:#f5f5f7;font-family:-apple-system,sans-serif}
.header{padding:18px;background:#fff;position:sticky;top:0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.wrap{max-width:900px;margin:auto;padding:16px}
.card{background:#fff;border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 6px 18px rgba(0,0,0,.08)}
.btn{background:#ff7a00;color:#fff;padding:14px;border-radius:12px;border:0;width:100%}
input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin:8px 0}
canvas{width:100%;height:140px;border:1px solid #ddd;border-radius:10px}
</style>
</head>
<body>
<div class="header"><button onclick="history.back()">← Back</button><h2>BL714</h2></div>
<div class="wrap">
<div class="card">
<h3>Certificate Owner</h3>
<input id="owner" readonly>
<input id="bank" readonly>
<input id="acct" readonly>
<label>Person Covered</label>
<select id="mode"><option>Same as Certificate Owner</option><option>Different Person</option></select>
<div id="pc" style="display:none">
<input placeholder="Name">
<input placeholder="IC">
<input placeholder="Phone">
<input placeholder="Address">
</div>
</div>
<div class="card">
<h3>Witness</h3>
<input placeholder="Witness Name">
<input placeholder="Witness IC">
<input placeholder="Witness Phone">
<canvas id="sig"></canvas>
</div>
<div class="card"><button class="btn">Generate Official PDF</button></div>
</div>
<script>
const c=JSON.parse(localStorage.getItem("currentClient")||localStorage.getItem("selectedClient")||"{}");
owner.value=c.name||"";
bank.value=c.bank||"";
acct.value=c.account||"";
mode.onchange=()=>pc.style.display=mode.selectedIndex? "block":"none";
</script>
</body>
</html>
