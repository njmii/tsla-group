<title>TSLA Price Checker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#f8f9fb;
color:#111;
}

.header{
background:white;
padding:20px;
position:sticky;
top:0;
z-index:100;
border-bottom:1px solid #eee;
}

.logo{
display:block;
margin:auto;
width:min(500px,90vw);
}

.container{
max-width:900px;
margin:auto;
padding:25px;
}

.search-card{
background:white;
padding:20px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
margin-bottom:20px;
}

.search-card h2{
margin-bottom:10px;
}

.search-card input{
width:100%;
padding:16px;
border-radius:16px;
border:2px solid #eee;
font-size:18px;
outline:none;
}

.search-card input:focus{
border-color:#ff7a00;
}

.badge{
display:inline-block;
background:#fff3e8;
color:#ff7a00;
padding:8px 14px;
border-radius:999px;
font-weight:600;
margin-top:10px;
}

.quote-card{
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.quote-header{
padding:18px 20px;
background:#ff7a00;
color:white;
font-weight:700;
font-size:20px;
}

.quote-row{
display:flex;
justify-content:space-between;
padding:16px 20px;
border-bottom:1px solid #f1f1f1;
}

.quote-row:last-child{
border-bottom:none;
}

.plan{
font-weight:600;
}

.price{
font-weight:700;
color:#ff7a00;
}

.empty{
background:white;
padding:30px;
border-radius:24px;
text-align:center;
color:#888;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#ff7a00;
font-weight:700;
}

.footer-space{
height:50px;
}

</style>
</head>
