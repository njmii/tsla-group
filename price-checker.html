<meta charset="UTF-8">

<title>TSLA Price Checker</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
body{
background:#f7f8fa;
color:#111;
}
.header{
position:sticky;
top:0;
background:white;
border-bottom:1px solid #eee;
padding:4px 12px;
z-index:100;
min-height:55px;
display:flex;
align-items:center;
justify-content:center;
}
.logo{
display:block;
margin:auto;
width:50px;
height:auto;
}
.container{
max-width:1000px;
margin:auto;
padding:20px;
}
.back{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
color:#ff7a00;
font-weight:700;
}
.search-card{
background:white;
padding:20px;
border-radius:24px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
margin-bottom:20px;
}
.search-title{
font-size:1.5rem;
font-weight:800;
margin-bottom:10px;
}
.search-card input{
width:100%;
padding:16px;
border-radius:16px;
border:2px solid #eee;
font-size:18px;
outline:none;
}
.search-card input:focus{
border-color:#ff7a00;
}
.badge{
display:inline-block;
margin-top:12px;
padding:8px 14px;
background:#fff3e8;
color:#ff7a00;
border-radius:999px;
font-weight:700;
}
.result-head{
background:white;
padding:18px;
border-radius:20px;
margin-bottom:18px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.year-title{
font-size:1.4rem;
font-weight:800;
}
.year-sub{
margin-top:5px;
color:#666;
}
.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}
.plan-card{
background:white;
padding:20px;
border-radius:24px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.plan-label{
font-size:.85rem;
color:#666;
}
.plan-name{
font-size:1.8rem;
font-weight:900;
margin-top:5px;
}
.cash{
margin-top:14px;
background:#fff3e8;
padding:12px;
border-radius:14px;
color:#ff7a00;
font-weight:700;
}
.price{
margin-top:16px;
font-size:2rem;
font-weight:900;
color:#ff7a00;
}
.price-label{
color:#666;
font-size:.9rem;
}
.wa-btn{
width:100%;
margin-top:12px;
padding:12px;
border:none;
border-radius:14px;
background:#25D366;
color:white;
font-weight:700;
font-size:15px;
cursor:pointer;
}
.empty{
background:white;
padding:30px;
border-radius:24px;
text-align:center;
color:#888;
box-shadow:0 4px 20px rgba(0,0,0,.05);
}
@media(max-width:700px){
.cards{
grid-template-columns:1fr;
}
.plan-name{
font-size:1.5rem;
}
.price{
font-size:1.7rem;
}
}
</style>
</head>

const search = document.getElementById("search");
const results = document.getElementById("results");
search.addEventListener("input", function(){
const year = this.value.trim();
if(!data[year]){
results.innerHTML = `
<div class="empty">
Tiada data dijumpai
</div>
`;
return;
}
let cards = "";
data[year].forEach(item=>{
let match = item[0].match(/\((.*?)\)/);
let benefit = "-";
if(match){
benefit =
"RM" +
(parseFloat(match[1]) * 1000).toLocaleString();
}
let hibah = item[0].replace(/\s*\(.*?\)/,'');
cards += `
<div class="plan-card">
<div class="plan-label">
🛡️ Hibah
</div>
<div class="plan-name">
${hibah}
</div>
<div class="cash">
💵 Cash Benefit ${benefit}
</div>
<div class="price">
${item[1]}
</div>
<div class="price-label">
Sebulan
</div>

<button
class="wa-btn"
onclick="shareWhatsApp(
'${year}',
'${hibah}',
'${benefit}',
'${item[1]}'
)">
📲 Share WhatsApp
</button>
</div>
`;
});
results.innerHTML = `
<div class="result-head">
<div class="year-title">
${year} Female
</div>
<div class="year-sub">
${data[year].length} Kelayakan Pelan
</div>
</div>
<div class="cards">
${cards}
</div>
`;
});

function shareWhatsApp(
year,
hibah,
benefit,
price
){

const text =
`TSLA Price Checker

Tahun Lahir: ${year}

Hibah: ${hibah}
Cash Benefit: ${benefit}
Sumbangan: ${price} sebulan

Hubungi saya untuk maklumat lanjut.`;

window.open(
"https://wa.me/?text=" +
encodeURIComponent(text),
"_blank"
);

}
