<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baby Kicker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
body{background:#fff5f7;color:#2d1b2e;min-height:100vh;overflow-x:hidden;}

.page-header{padding:24px 20px 0;text-align:center;}
.page-title{font-size:1.5rem;font-weight:900;color:#c2185b;letter-spacing:-.01em;}
.page-date{font-size:.82rem;color:#c9a8be;margin-top:4px;font-weight:500;}

.btn-zone{display:flex;flex-direction:column;align-items:center;padding:32px 20px 20px;}

.kick-btn{
  width:230px;height:230px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(145deg,#ff6b9d 0%,#e91e8c 100%);
  color:white;font-size:2.6rem;font-weight:900;letter-spacing:.08em;
  box-shadow:0 12px 40px rgba(233,30,140,.4),0 0 0 0 rgba(255,107,157,.3);
  transition:transform .12s,box-shadow .12s;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.kick-btn:active{transform:scale(.92);box-shadow:0 4px 18px rgba(233,30,140,.3);}
.kick-btn.pop{animation:pop .5s ease-out;}
@keyframes pop{
  0%{box-shadow:0 12px 40px rgba(233,30,140,.4),0 0 0 0 rgba(255,107,157,.5);}
  60%{box-shadow:0 12px 40px rgba(233,30,140,.1),0 0 0 40px rgba(255,107,157,0);}
  100%{box-shadow:0 12px 40px rgba(233,30,140,.4),0 0 0 0 rgba(255,107,157,0);}
}

.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.3);
  pointer-events:none;
  animation:ripple .65s ease-out forwards;
}
@keyframes ripple{
  from{width:0;height:0;opacity:1;transform:translate(-50%,-50%);}
  to{width:260px;height:260px;opacity:0;transform:translate(-50%,-50%);}
}

.float-tag{
  position:fixed;pointer-events:none;z-index:999;
  font-size:2rem;font-weight:900;color:#e91e8c;
  animation:floatUp .9s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1);}
  30%{opacity:1;transform:translateY(-20px) scale(1.2);}
  100%{opacity:0;transform:translateY(-90px) scale(.8);}
}

.count-wrap{margin-top:22px;text-align:center;}
.count-num{font-size:4rem;font-weight:900;color:#c2185b;line-height:1;letter-spacing:-.04em;}
.count-label{font-size:.9rem;font-weight:600;color:#c9a8be;margin-top:4px;}

.undo-btn{
  margin-top:14px;background:none;border:2px solid #f8bbd0;
  border-radius:12px;padding:9px 20px;font-weight:700;font-size:.82rem;
  color:#c9a8be;cursor:pointer;transition:.15s;
}
.undo-btn:hover{border-color:#ff6b9d;color:#c2185b;}

.section{margin:0 16px 14px;background:white;border-radius:20px;padding:18px 20px;box-shadow:0 2px 12px rgba(194,24,91,.05);}
.sec-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#c9a8be;margin-bottom:12px;}

.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{background:#fce4ec;border-radius:10px;padding:6px 12px;font-size:.82rem;font-weight:700;color:#c2185b;}
.chip.latest{background:#ff6b9d;color:white;}

.hist-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #fce4ec;}
.hist-row:last-child{border:none;padding-bottom:0;}
.hist-date{font-size:.9rem;font-weight:700;}
.hist-sub{font-size:.72rem;color:#c9a8be;margin-top:2px;}
.hist-badge{background:#fce4ec;color:#c2185b;border-radius:10px;padding:5px 13px;font-size:.88rem;font-weight:800;white-space:nowrap;}

.empty{text-align:center;color:#e0b0c0;font-size:.88rem;padding:18px 0;}

.footer{text-align:center;color:#e0b0c0;font-size:.75rem;padding:16px 20px 32px;}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">🤰 Baby Kicker</div>
  <div class="page-date" id="pageDate"></div>
</div>

<div class="btn-zone">
  <button class="kick-btn" id="kickBtn" onclick="recordKick(event)">KICK</button>
  <div class="count-wrap">
    <div class="count-num" id="countNum">0</div>
    <div class="count-label">kicks today</div>
  </div>
  <button class="undo-btn" id="undoBtn" onclick="undoLast()" style="display:none">↩ Undo last</button>
</div>

<div class="section">
  <div class="sec-title">Today's kicks</div>
  <div class="chips" id="chips"><div class="empty">Tap KICK to start tracking</div></div>
</div>

<div class="section">
  <div class="sec-title">History</div>
  <div id="histList"><div class="empty">No history yet</div></div>
</div>

<div class="footer">Data saved on this device</div>

<script>
const KEY = 'tsla_babykicks';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || '{"kicks":[]}'); }
  catch(e) { return {kicks:[]}; }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function todayStr() { return new Date().toISOString().split('T')[0]; }

function fmtTime(ts) {
  const d = new Date(ts);
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2,'0') + ' ' + ap;
}

function fmtLabel(dateStr) {
  const today = todayStr();
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (dateStr === today) return 'Today';
  if (dateStr === yesterday) return 'Yesterday';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-MY', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}

function render() {
  const data = load();
  const today = todayStr();
  const todayKicks = data.kicks.filter(k => k.date === today);

  document.getElementById('countNum').textContent = todayKicks.length;
  document.getElementById('undoBtn').style.display = todayKicks.length ? '' : 'none';

  // today's chips
  const chipsEl = document.getElementById('chips');
  if (!todayKicks.length) {
    chipsEl.innerHTML = '<div class="empty">Tap KICK to start tracking</div>';
  } else {
    chipsEl.innerHTML = todayKicks.map((k, i) => {
      const isLatest = i === todayKicks.length - 1;
      return `<div class="chip${isLatest ? ' latest' : ''}">${fmtTime(k.ts)}</div>`;
    }).join('');
  }

  // history (days other than today, newest first)
  const byDay = {};
  data.kicks.forEach(k => { byDay[k.date] = (byDay[k.date] || 0) + 1; });
  const pastDays = Object.keys(byDay).filter(d => d !== today).sort().reverse().slice(0, 30);
  const histEl = document.getElementById('histList');
  if (!pastDays.length) {
    histEl.innerHTML = '<div class="empty">No history yet</div>';
  } else {
    histEl.innerHTML = pastDays.map(d => `
      <div class="hist-row">
        <div>
          <div class="hist-date">${fmtLabel(d)}</div>
          <div class="hist-sub">${d}</div>
        </div>
        <span class="hist-badge">${byDay[d]} kick${byDay[d]!==1?'s':''}</span>
      </div>`).join('');
  }
}

function recordKick(e) {
  const btn = document.getElementById('kickBtn');

  // ripple effect
  const r = document.createElement('div');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  r.style.left = ((e.clientX || rect.left + rect.width/2) - rect.left) + 'px';
  r.style.top  = ((e.clientY || rect.top + rect.height/2) - rect.top)  + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);

  // pulse ring
  btn.classList.remove('pop');
  void btn.offsetWidth;
  btn.classList.add('pop');

  // floating +1
  const tag = document.createElement('div');
  tag.className = 'float-tag';
  tag.textContent = '+1';
  tag.style.left = (rect.left + rect.width/2 - 20) + 'px';
  tag.style.top  = (rect.top  + 30) + 'px';
  document.body.appendChild(tag);
  setTimeout(() => tag.remove(), 950);

  // vibrate
  if (navigator.vibrate) navigator.vibrate(50);

  // save
  const data = load();
  data.kicks.push({ ts: Date.now(), date: todayStr() });
  save(data);
  render();
}

function undoLast() {
  const data = load();
  const today = todayStr();
  // find last today kick
  for (let i = data.kicks.length - 1; i >= 0; i--) {
    if (data.kicks[i].date === today) {
      data.kicks.splice(i, 1);
      save(data);
      render();
      return;
    }
  }
}

// date label
document.getElementById('pageDate').textContent = new Date().toLocaleDateString('en-MY', {
  weekday:'long', day:'numeric', month:'long', year:'numeric'
});

render();
</script>
</body>
</html>
