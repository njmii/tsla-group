<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Budget Tracker — TSLA Group</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#f7f8fa;color:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden;min-height:100vh}

.glow{position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(255,122,0,.1),transparent 70%);top:-250px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:-1}

/* NAV */
.navbar{position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(15px);border-bottom:1px solid #eee;z-index:999}
.nav-content{max-width:1200px;margin:auto;padding:4px 20px;display:flex;justify-content:space-between;align-items:center;min-height:55px}
.nav-logo{width:50px;height:auto}
.nav-back{color:#ff7a00;font-weight:800;font-size:.85rem;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-back:hover{opacity:.75}

/* MAIN WRAP */
.main{max-width:900px;margin:0 auto;padding:24px 16px 80px}

/* SETUP PANEL */
.setup-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:white;border:none;border-radius:20px;padding:16px 20px;font-family:inherit;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:12px;transition:.2s}
.setup-toggle:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)}
.setup-toggle-left{display:flex;align-items:center;gap:12px}
.setup-icon{font-size:1.3rem}
.setup-label{font-weight:800;font-size:.95rem}
.setup-daily{font-size:.82rem;color:#ff7a00;font-weight:700}
.setup-arrow{font-size:.8rem;color:#aaa;transition:transform .3s}
.setup-arrow.open{transform:rotate(180deg)}

.setup-body{background:white;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,.05);overflow:hidden;max-height:0;transition:max-height .4s cubic-bezier(.22,1,.36,1),padding .3s}
.setup-body.open{max-height:600px;padding:24px}
.setup-body-inner{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:600px){.setup-body-inner{grid-template-columns:1fr}}

.field-lbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:8px}
.salary-row{display:flex;align-items:center;border:2px solid #eee;border-radius:14px;overflow:hidden;transition:.2s}
.salary-row:focus-within{border-color:#ff7a00}
.salary-pre{padding:0 12px;font-weight:800;color:#aaa;font-size:.85rem;background:#f7f8fa;align-self:stretch;display:flex;align-items:center;border-right:2px solid #eee}
.salary-input{flex:1;padding:13px 14px;border:none;font-size:1.1rem;font-weight:900;color:#111;font-variant-numeric:tabular-nums;background:transparent;outline:none;font-family:inherit}

.commit-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.commit-row{display:flex;gap:8px;align-items:center;animation:rowIn .2s ease}
@keyframes rowIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.commit-name{flex:1;padding:11px 14px;border:2px solid #eee;border-radius:12px;font-size:.88rem;font-weight:600;font-family:inherit;color:#111;background:#f7f8fa;outline:none;transition:.2s}
.commit-name:focus{border-color:#ff7a00;background:white}
.commit-name::placeholder{color:#bbb;font-weight:400}
.commit-amt-wrap{display:flex;align-items:center;border:2px solid #eee;border-radius:12px;overflow:hidden;transition:.2s;width:120px;flex-shrink:0}
.commit-amt-wrap:focus-within{border-color:#ff7a00}
.commit-pre{padding:0 8px;font-size:.75rem;font-weight:800;color:#aaa;background:#f7f8fa;align-self:stretch;display:flex;align-items:center;border-right:2px solid #eee}
.commit-amt{width:78px;padding:11px 8px;border:none;font-size:.88rem;font-weight:700;color:#111;font-variant-numeric:tabular-nums;background:transparent;outline:none;font-family:inherit}
.commit-del{width:34px;height:34px;border-radius:50%;border:none;background:#fff0f0;color:#e53935;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:.2s;display:flex;align-items:center;justify-content:center}
.commit-del:hover{background:#e53935;color:white}
.add-btn{width:100%;padding:11px;border:2px dashed #eee;border-radius:14px;background:transparent;color:#aaa;font-weight:700;font-size:.82rem;cursor:pointer;transition:.2s;font-family:inherit}
.add-btn:hover{border-color:#ff7a00;color:#ff7a00;background:#fff8f4}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin:20px 0 16px;padding:0 4px}
.month-nav-btn{background:white;border:1px solid #eee;border-radius:12px;width:40px;height:40px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.month-nav-btn:hover{border-color:#ff7a00;color:#ff7a00}
.month-title{font-size:1.25rem;font-weight:900;letter-spacing:-.02em}

/* SUMMARY STRIP */
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:540px){.summary-strip{grid-template-columns:1fr 1fr}}
.strip-card{background:white;border-radius:16px;padding:14px 16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.strip-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:4px}
.strip-val{font-size:1.05rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.strip-val.pos{color:#0a9b43}
.strip-val.neg{color:#e53935}
.strip-val.orange{color:#ff7a00}

/* CALENDAR */
.cal-wrap{background:white;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.06);overflow:hidden}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:#f7f8fa;border-bottom:1px solid #eee}
.cal-head-cell{padding:10px 0;text-align:center;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#bbb}
.cal-head-cell.weekend{color:#ff7a00}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}

.cal-day{min-height:82px;padding:8px 10px;border-right:1px solid #f3f3f3;border-bottom:1px solid #f3f3f3;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;position:relative}
.cal-day:hover{background:#fafafa}
.cal-day:nth-child(7n){border-right:none}
.cal-day.empty{cursor:default;background:#f9f9f9}
.cal-day.empty:hover{background:#f9f9f9}
.cal-day.today{background:#fff8f2}
.cal-day.today::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#ff7a00;border-radius:0}
.cal-day.future{opacity:.55}
.cal-day.has-data{cursor:pointer}
.cal-day.surplus .cal-day-bal{color:#0a9b43}
.cal-day.deficit .cal-day-bal{color:#e53935}

.cal-day-num{font-size:.75rem;font-weight:800;color:#bbb;margin-bottom:auto}
.cal-day.today .cal-day-num{color:#ff7a00}
.cal-day.past .cal-day-num,.cal-day.has-data .cal-day-num{color:#888}
.cal-day-bal{font-size:1rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1;margin-top:auto}
.cal-day-spent{font-size:.62rem;color:#bbb;font-variant-numeric:tabular-nums;margin-top:2px}
.cal-day-dot{position:absolute;top:6px;right:8px;width:6px;height:6px;border-radius:50%;background:#ff7a00}
@media(max-width:480px){
  .cal-day{min-height:62px;padding:6px 6px}
  .cal-day-bal{font-size:.82rem}
  .cal-day-num{font-size:.7rem}
  .cal-day-spent{display:none}
}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:900;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-card{background:white;border-radius:28px 28px 0 0;width:100%;max-width:520px;padding:24px 24px 40px;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);max-height:85vh;overflow-y:auto}
@media(min-width:600px){.modal-card{border-radius:28px;transform:translateY(20px) scale(.97);max-height:80vh}}
.modal-overlay.open .modal-card{transform:none}
.modal-handle{width:40px;height:4px;border-radius:4px;background:#eee;margin:0 auto 20px}
@media(min-width:600px){.modal-handle{display:none}}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.modal-date{font-weight:900;font-size:1.1rem}
.modal-close{background:none;border:none;font-size:1.4rem;color:#aaa;cursor:pointer;padding:0;line-height:1}
.modal-close:hover{color:#111}

.modal-bal-chip{display:inline-flex;align-items:center;gap:6px;border-radius:12px;padding:8px 14px;font-weight:800;font-size:.88rem;margin-bottom:20px}
.bal-pos{background:#e8f5ee;color:#0a9b43}
.bal-neg{background:#fde8e8;color:#e53935}
.bal-zero{background:#f0f0f0;color:#888}

.exp-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.exp-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f7f8fa;border-radius:14px}
.exp-desc{flex:1;font-size:.88rem;font-weight:600;color:#333}
.exp-amt{font-size:.9rem;font-weight:800;color:#e53935;font-variant-numeric:tabular-nums;flex-shrink:0}
.exp-del{background:none;border:none;color:#ddd;font-size:1.1rem;cursor:pointer;padding:0;flex-shrink:0;transition:.2s}
.exp-del:hover{color:#e53935}
.exp-empty{text-align:center;color:#ccc;font-size:.82rem;padding:16px 0}

.add-exp-form{display:flex;gap:8px;margin-bottom:12px}
.exp-input{flex:1;padding:12px 14px;border:2px solid #eee;border-radius:14px;font-size:.88rem;font-weight:600;font-family:inherit;color:#111;background:#f7f8fa;outline:none;transition:.2s}
.exp-input:focus{border-color:#ff7a00;background:white}
.exp-input::placeholder{color:#bbb;font-weight:400}
.exp-amt-wrap{display:flex;align-items:center;border:2px solid #eee;border-radius:14px;overflow:hidden;transition:.2s;width:110px;flex-shrink:0}
.exp-amt-wrap:focus-within{border-color:#ff7a00}
.exp-amt-pre{padding:0 8px;font-size:.75rem;font-weight:800;color:#aaa;background:#f7f8fa;border-right:2px solid #eee;align-self:stretch;display:flex;align-items:center}
.exp-amt-input{width:72px;padding:12px 8px;border:none;font-size:.88rem;font-weight:700;color:#111;font-variant-numeric:tabular-nums;background:transparent;outline:none;font-family:inherit}
.exp-add-btn{padding:12px 18px;border:none;border-radius:14px;background:#ff7a00;color:white;font-weight:800;font-size:.82rem;cursor:pointer;font-family:inherit;transition:.2s;flex-shrink:0}
.exp-add-btn:hover{background:#e56d00}

.modal-daily-hint{font-size:.75rem;color:#aaa;text-align:center;margin-top:4px}

/* COMMITMENTS TRACKER */
.commit-tracker{background:white;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.06);padding:20px 24px;margin-bottom:20px}
.ct-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ct-title{font-weight:900;font-size:.95rem}
.ct-tally{font-size:.78rem;color:#888;font-weight:700}
.ct-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f5f5f5;flex-wrap:wrap}
.ct-row:last-of-type{border-bottom:none}
.ct-name{flex:1;font-size:.88rem;font-weight:700;min-width:80px}
.ct-fullamt{font-size:.78rem;color:#bbb;font-variant-numeric:tabular-nums;white-space:nowrap}
.ct-action{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pay-btn{padding:6px 16px;border:1.5px solid #eee;border-radius:20px;background:transparent;color:#888;font-size:.75rem;font-weight:800;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
.pay-btn:hover{border-color:#ff7a00;color:#ff7a00;background:#fff8f4}
.pay-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:800}
.pay-chip.paid-full{background:#e8f5ee;color:#0a9b43}
.pay-chip.paid-partial{background:#fff4eb;color:#ff7a00}
.pay-reset{background:none;border:none;color:#ddd;cursor:pointer;font-size:.95rem;padding:0 2px;line-height:1;transition:.2s}
.pay-reset:hover{color:#e53935}
.pay-form{display:flex;gap:6px;align-items:center;flex-wrap:wrap;animation:rowIn .2s ease}
.pay-form-full-btn{padding:7px 13px;border:none;border-radius:12px;background:#e8f5ee;color:#0a9b43;font-size:.75rem;font-weight:800;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
.pay-form-full-btn:hover{background:#d1edd8}
.pay-inp-wrap{display:flex;align-items:center;border:2px solid #eee;border-radius:12px;overflow:hidden;transition:.2s;width:116px;flex-shrink:0}
.pay-inp-wrap:focus-within{border-color:#ff7a00}
.pay-inp-pre{padding:0 7px;font-size:.72rem;font-weight:800;color:#aaa;background:#f7f8fa;border-right:2px solid #eee;align-self:stretch;display:flex;align-items:center}
.pay-inp{width:80px;padding:7px 8px;border:none;font-size:.82rem;font-weight:700;color:#111;font-variant-numeric:tabular-nums;background:transparent;outline:none;font-family:inherit}
.pay-ok-btn{padding:7px 13px;border:none;border-radius:12px;background:#0a9b43;color:white;font-size:.75rem;font-weight:800;cursor:pointer;font-family:inherit;transition:.2s}
.pay-ok-btn:hover{background:#088a38}
.pay-cancel{background:none;border:none;color:#ccc;font-size:.9rem;cursor:pointer;padding:0 3px;font-family:inherit}
.ct-prog-wrap{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid #f5f5f5}
.ct-prog-track{flex:1;height:7px;background:#f0f0f0;border-radius:6px;overflow:hidden}
.ct-prog-fill{height:100%;background:linear-gradient(90deg,#0a9b43,#34d399);border-radius:6px;transition:width .45s cubic-bezier(.22,1,.36,1)}
.ct-prog-lbl{font-size:.72rem;font-weight:800;color:#888;white-space:nowrap;font-variant-numeric:tabular-nums}

/* FOOTER */
.footer{padding:32px 20px;text-align:center;color:#aaa;font-size:.78rem;border-top:1px solid #eee}
</style>
</head>
<body>
<div class="glow"></div>

<!-- NAV -->
<div class="navbar">
  <div class="nav-content">
    <img class="nav-logo" src="assets/tslalogo.png" alt="TSLA Group"/>
    <a class="nav-back" href="recruit.html">← Back</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SETUP TOGGLE -->
  <button class="setup-toggle" onclick="toggleSetup()">
    <div class="setup-toggle-left">
      <span class="setup-icon">⚙️</span>
      <div>
        <div class="setup-label">Budget Setup</div>
        <div class="setup-daily" id="setupSummary">Tap to configure salary &amp; commitments</div>
      </div>
    </div>
    <span class="setup-arrow" id="setupArrow">▼</span>
  </button>

  <!-- SETUP BODY -->
  <div class="setup-body" id="setupBody">
    <div class="setup-body-inner">
      <!-- Salary -->
      <div>
        <div class="field-lbl">Monthly Take-Home Salary</div>
        <div class="salary-row">
          <span class="salary-pre">RM</span>
          <input class="salary-input" id="salaryInput" type="number" min="0" placeholder="0.00" oninput="recalcSetup()"/>
        </div>
      </div>
      <!-- Right: commitments -->
      <div>
        <div class="field-lbl">Monthly Commitments</div>
        <div class="commit-list" id="commitList"></div>
        <button class="add-btn" onclick="addCommit()">+ Add Commitment</button>
      </div>
    </div>
  </div>

  <!-- MONTH NAV -->
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-title" id="monthTitle">—</span>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- SUMMARY STRIP -->
  <div class="summary-strip">
    <div class="strip-card">
      <div class="strip-lbl">Daily Budget</div>
      <div class="strip-val orange" id="stripDaily">RM —</div>
    </div>
    <div class="strip-card">
      <div class="strip-lbl">Spent This Month</div>
      <div class="strip-val neg" id="stripSpent">RM 0</div>
    </div>
    <div class="strip-card">
      <div class="strip-lbl">Current Balance</div>
      <div class="strip-val" id="stripBalance">—</div>
    </div>
    <div class="strip-card">
      <div class="strip-lbl">Days Left</div>
      <div class="strip-val orange" id="stripDaysLeft">—</div>
    </div>
  </div>

  <!-- COMMITMENTS TRACKER -->
  <div class="commit-tracker" id="commitTracker" style="display:none"></div>

  <!-- CALENDAR -->
  <div class="cal-wrap">
    <div class="cal-head" id="calHead"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

</div>

<!-- EXPENSE MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal-card" id="modalCard">
    <div class="modal-handle"></div>
    <div class="modal-top">
      <div>
        <div class="modal-date" id="modalDateLabel">—</div>
        <div id="modalBalChip" class="modal-bal-chip bal-zero">Balance: —</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="exp-list" id="expList"></div>
    <div class="add-exp-form">
      <input class="exp-input" type="text" id="expDesc" placeholder="Description…" maxlength="60" onkeydown="if(event.key==='Enter')addExp()"/>
      <div class="exp-amt-wrap">
        <span class="exp-amt-pre">RM</span>
        <input class="exp-amt-input" type="number" min="0" step="0.01" id="expAmt" placeholder="0" onkeydown="if(event.key==='Enter')addExp()"/>
      </div>
      <button class="exp-add-btn" onclick="addExp()">Add</button>
    </div>
    <div class="modal-daily-hint" id="modalDailyHint"></div>
  </div>
</div>

<div class="footer">© 2026 TSLA Group · Budget Tracker</div>

<script>
const SK = 'tsla_budget2';

let data = {
  salary: 0,
  commitments: [],
  expenses: {},    // { 'YYYY-MM-DD': [{id, desc, amt}] }
  payments: {},    // { 'YYYY-MM': { commitId: paidAmt } }
};

let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let openDate  = null;

/* ── utils ── */
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function fmtRM(n, showSign) {
  const abs = 'RM ' + Math.abs(n).toLocaleString('en-MY', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (!showSign) return abs;
  return (n < 0 ? '−' : '+') + abs;
}
function fmtDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-MY', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}
function dailyBudget() {
  const totalCommit = data.commitments.reduce((s,c) => s + (parseFloat(c.amount) || 0), 0);
  const free = (parseFloat(data.salary) || 0) - totalCommit;
  const days = daysInMonth(viewYear, viewMonth);
  return free / days;
}
function spentOnDay(str) {
  return (data.expenses[str] || []).reduce((s, e) => s + (parseFloat(e.amt) || 0), 0);
}

/* Rolling balance up to and including a date (within viewYear/viewMonth) */
function balanceUpTo(dayNum) {
  const db = dailyBudget();
  let bal = 0;
  for (let d = 1; d <= dayNum; d++) {
    const str = dateStr(viewYear, viewMonth, d);
    bal += db - spentOnDay(str);
  }
  return bal;
}

/* ── setup panel ── */
function toggleSetup() {
  const body  = document.getElementById('setupBody');
  const arrow = document.getElementById('setupArrow');
  const isOpen = body.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
}

function addCommit(name='', amount='') {
  const id = Date.now() + Math.random();
  data.commitments.push({id, name, amount});
  renderCommits();
  save();
}

function removeCommit(id) {
  data.commitments = data.commitments.filter(c => c.id !== id);
  renderCommits();
  recalcSetup();
  save();
}

function renderCommits() {
  const list = document.getElementById('commitList');
  list.innerHTML = '';
  if (!data.commitments.length) {
    list.innerHTML = '<div style="color:#ccc;font-size:.8rem;padding:8px 0">No commitments yet</div>';
    return;
  }
  data.commitments.forEach(c => {
    const row = document.createElement('div');
    row.className = 'commit-row';
    row.innerHTML = `
      <input class="commit-name" type="text" placeholder="e.g. Car loan…" value="${c.name||''}" oninput="updateCommit(${c.id},'name',this.value)"/>
      <div class="commit-amt-wrap">
        <span class="commit-pre">RM</span>
        <input class="commit-amt" type="number" min="0" placeholder="0" value="${c.amount||''}" oninput="updateCommit(${c.id},'amount',this.value)"/>
      </div>
      <button class="commit-del" onclick="removeCommit(${c.id})" title="Remove">×</button>`;
    list.appendChild(row);
  });
}

function updateCommit(id, field, val) {
  const c = data.commitments.find(x => x.id === id);
  if (c) c[field] = val;
  recalcSetup();
  save();
}

function recalcSetup() {
  data.salary = parseFloat(document.getElementById('salaryInput').value) || 0;
  const db = dailyBudget();
  const totalCommit = data.commitments.reduce((s,c) => s + (parseFloat(c.amount)||0), 0);
  const summaryEl = document.getElementById('setupSummary');
  if (data.salary > 0) {
    summaryEl.textContent = `Salary RM ${data.salary.toLocaleString('en-MY')} · Commitments RM ${totalCommit.toLocaleString('en-MY')} · Daily RM ${db.toFixed(2)}`;
  } else {
    summaryEl.textContent = 'Tap to configure salary & commitments';
  }
  renderCalendar();
  save();
}

/* ── commitment payment tracking ── */
function payKey() {
  return `${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
}

function getPayment(commitId) {
  const monthData = (data.payments || {})[payKey()] || {};
  return monthData.hasOwnProperty(commitId) ? monthData[commitId] : null;
}

function setPayment(commitId, paidAmt) {
  if (!data.payments) data.payments = {};
  if (!data.payments[payKey()]) data.payments[payKey()] = {};
  data.payments[payKey()][commitId] = paidAmt;
  save();
  renderCommitmentsTracker();
}

function clearPayment(commitId) {
  if (!data.payments || !data.payments[payKey()]) return;
  delete data.payments[payKey()][commitId];
  save();
  renderCommitmentsTracker();
}

function renderCommitmentsTracker() {
  const el = document.getElementById('commitTracker');
  if (!el) return;
  if (!data.commitments.length) { el.style.display = 'none'; return; }
  el.style.display = '';

  let totalAmt = 0, paidTotal = 0;
  data.commitments.forEach(c => {
    const amt = parseFloat(c.amount) || 0;
    totalAmt += amt;
    const paid = getPayment(c.id);
    if (paid !== null) paidTotal += Math.min(paid, amt);
  });

  const pct = totalAmt > 0 ? Math.round(paidTotal / totalAmt * 100) : 0;
  const monthName = new Date(viewYear, viewMonth, 1).toLocaleString('en-MY', {month:'long', year:'numeric'});

  let html = `
    <div class="ct-header">
      <span class="ct-title">💳 Commitments — ${monthName}</span>
      <span class="ct-tally">${pct}% paid</span>
    </div>`;

  data.commitments.forEach(c => {
    const amt = parseFloat(c.amount) || 0;
    const paid = getPayment(c.id);
    const isPaidFull = paid !== null && paid >= amt;
    const isPaidPartial = paid !== null && paid > 0 && paid < amt;

    let actionHtml;
    if (isPaidFull) {
      actionHtml = `<div class="ct-action">
        <span class="pay-chip paid-full">✓ Paid RM ${amt.toFixed(2)}</span>
        <button class="pay-reset" onclick="clearPayment(${c.id})" title="Clear">×</button>
      </div>`;
    } else if (isPaidPartial) {
      actionHtml = `<div class="ct-action">
        <span class="pay-chip paid-partial">~ RM ${paid.toFixed(2)} paid</span>
        <button class="pay-reset" onclick="clearPayment(${c.id})" title="Clear">×</button>
      </div>`;
    } else {
      actionHtml = `<div class="ct-action" id="ct-action-${c.id}">
        <button class="pay-btn" onclick="showPayForm(${c.id})">Pay</button>
      </div>`;
    }

    html += `<div class="ct-row">
      <span class="ct-name">${(c.name||'Unnamed').replace(/</g,'&lt;')}</span>
      <span class="ct-fullamt">RM ${amt.toFixed(2)}</span>
      ${actionHtml}
    </div>`;
  });

  html += `<div class="ct-prog-wrap">
    <div class="ct-prog-track"><div class="ct-prog-fill" style="width:${pct}%"></div></div>
    <span class="ct-prog-lbl">RM ${paidTotal.toFixed(2)} / RM ${totalAmt.toFixed(2)}</span>
  </div>`;

  el.innerHTML = html;
}

function showPayForm(commitId) {
  const c = data.commitments.find(x => x.id === commitId);
  if (!c) return;
  const amt = parseFloat(c.amount) || 0;
  const actionEl = document.getElementById(`ct-action-${commitId}`);
  if (!actionEl) return;
  actionEl.innerHTML = `<div class="pay-form">
    <button class="pay-form-full-btn" onclick="setPayment(${commitId}, ${amt})">Full RM ${amt.toFixed(2)}</button>
    <div class="pay-inp-wrap">
      <span class="pay-inp-pre">RM</span>
      <input class="pay-inp" id="pay-inp-${commitId}" type="number" min="0" step="0.01" max="${amt}" placeholder="0.00" onkeydown="if(event.key==='Enter')confirmPartial(${commitId})"/>
    </div>
    <button class="pay-ok-btn" onclick="confirmPartial(${commitId})">OK</button>
    <button class="pay-cancel" onclick="renderCommitmentsTracker()">✕</button>
  </div>`;
  setTimeout(() => document.getElementById(`pay-inp-${commitId}`)?.focus(), 50);
}

function confirmPartial(commitId) {
  const c = data.commitments.find(x => x.id === commitId);
  if (!c) return;
  const maxAmt = parseFloat(c.amount) || 0;
  const inp = document.getElementById(`pay-inp-${commitId}`);
  const val = parseFloat(inp?.value) || 0;
  if (val <= 0) return;
  setPayment(commitId, Math.min(val, maxAmt));
}

/* ── calendar ── */
function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderCalendar();
  renderCommitmentsTracker();
}

function renderCalendar() {
  const today = todayStr();
  const days = daysInMonth(viewYear, viewMonth);
  const db = dailyBudget();
  const now = new Date();

  // Update month title
  document.getElementById('monthTitle').textContent =
    new Date(viewYear, viewMonth, 1).toLocaleString('en-MY', {month:'long', year:'numeric'});

  // Calendar header (Sun → Sat)
  const headEl = document.getElementById('calHead');
  headEl.innerHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    .map((d,i) => `<div class="cal-head-cell${i===0||i===6?' weekend':''}">${d}</div>`).join('');

  // First weekday offset (0=Sun)
  const offset = new Date(viewYear, viewMonth, 1).getDay();
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Empty cells before month start
  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  // Day cells
  for (let d = 1; d <= days; d++) {
    const str = dateStr(viewYear, viewMonth, d);
    const isPast   = str < today;
    const isToday  = str === today;
    const isFuture = str > today;
    const bal   = balanceUpTo(d);
    const spent = spentOnDay(str);
    const hasData = (data.expenses[str] || []).length > 0;

    const el = document.createElement('div');
    let cls = 'cal-day';
    if (isToday)  cls += ' today past';
    if (isPast)   cls += ' past';
    if (isFuture) cls += ' future';
    if (bal > 0)  cls += ' surplus';
    if (bal < 0)  cls += ' deficit';
    if (hasData)  cls += ' has-data';
    el.className = cls;
    el.onclick = () => openDay(str);

    let inner = `<span class="cal-day-num">${d}</span>`;
    if (hasData) inner += `<span class="cal-day-dot"></span>`;

    if (!isFuture || isToday) {
      inner += `<span class="cal-day-bal">${bal >= 0 ? '' : '−'}RM ${Math.abs(bal).toFixed(2)}</span>`;
      if (spent > 0) {
        inner += `<span class="cal-day-spent">−RM ${spent.toFixed(2)}</span>`;
      }
    } else {
      // Future: show projected daily gain faintly
      inner += `<span class="cal-day-bal" style="color:#ccc;font-size:.78rem">+RM ${db > 0 ? db.toFixed(2) : '—'}</span>`;
    }

    el.innerHTML = inner;
    grid.appendChild(el);
  }

  updateSummaryStrip(today, days, db);
}

function updateSummaryStrip(today, days, db) {
  // Total spent this month up to today
  let totalSpent = 0;
  const todayDate = new Date(today + 'T00:00:00');
  const isCurrentMonth = (todayDate.getFullYear() === viewYear && todayDate.getMonth() === viewMonth);

  for (let d = 1; d <= days; d++) {
    const str = dateStr(viewYear, viewMonth, d);
    if (str <= today) totalSpent += spentOnDay(str);
  }

  // Current balance (up to today or last day of month if past month)
  const lastDay = isCurrentMonth ? todayDate.getDate() : days;
  const bal = balanceUpTo(lastDay);

  document.getElementById('stripDaily').textContent = db > 0 ? `RM ${db.toFixed(2)}` : '—';
  document.getElementById('stripSpent').textContent = `RM ${totalSpent.toFixed(2)}`;
  const balEl = document.getElementById('stripBalance');
  balEl.textContent = `${bal >= 0 ? '' : '−'}RM ${Math.abs(bal).toFixed(2)}`;
  balEl.className = 'strip-val ' + (bal > 0 ? 'pos' : bal < 0 ? 'neg' : '');

  const daysLeft = isCurrentMonth ? days - todayDate.getDate() : 0;
  document.getElementById('stripDaysLeft').textContent = daysLeft > 0 ? `${daysLeft} days` : '—';
}

/* ── day modal ── */
function openDay(str) {
  openDate = str;
  renderModal();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('expDesc').focus(), 350);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  openDate = null;
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function renderModal() {
  if (!openDate) return;
  const str = openDate;
  const [y, m, d] = str.split('-').map(Number);
  const dayNum = d;
  const bal    = balanceUpTo(dayNum);
  const db     = dailyBudget();
  const exps   = data.expenses[str] || [];

  document.getElementById('modalDateLabel').textContent = fmtDate(str);

  const chip = document.getElementById('modalBalChip');
  const sign = bal >= 0 ? '+' : '−';
  chip.textContent = `Balance: ${sign}RM ${Math.abs(bal).toFixed(2)}`;
  chip.className = 'modal-bal-chip ' + (bal > 0 ? 'bal-pos' : bal < 0 ? 'bal-neg' : 'bal-zero');

  document.getElementById('modalDailyHint').textContent =
    db > 0 ? `Daily allocation: RM ${db.toFixed(2)}/day` : '';

  const listEl = document.getElementById('expList');
  if (!exps.length) {
    listEl.innerHTML = '<div class="exp-empty">No expenses yet — add one below</div>';
    return;
  }
  listEl.innerHTML = exps.map(e =>
    `<div class="exp-row">
      <span class="exp-desc">${e.desc.replace(/</g,'&lt;')}</span>
      <span class="exp-amt">−RM ${parseFloat(e.amt).toFixed(2)}</span>
      <button class="exp-del" onclick="removeExp('${str}', ${e.id})" title="Remove">×</button>
    </div>`
  ).join('');
}

function addExp() {
  if (!openDate) return;
  const desc = document.getElementById('expDesc').value.trim();
  const amt  = parseFloat(document.getElementById('expAmt').value);
  if (!desc || isNaN(amt) || amt <= 0) return;

  if (!data.expenses[openDate]) data.expenses[openDate] = [];
  data.expenses[openDate].push({id: Date.now() + Math.random(), desc, amt});

  document.getElementById('expDesc').value = '';
  document.getElementById('expAmt').value  = '';
  document.getElementById('expDesc').focus();

  save();
  renderModal();
  renderCalendar();
}

function removeExp(str, id) {
  if (!data.expenses[str]) return;
  data.expenses[str] = data.expenses[str].filter(e => e.id !== id);
  if (!data.expenses[str].length) delete data.expenses[str];
  save();
  renderModal();
  renderCalendar();
}

/* ── storage ── */
function save() {
  localStorage.setItem(SK, JSON.stringify(data));
}

function load() {
  const raw = localStorage.getItem(SK);
  if (raw) {
    try { data = JSON.parse(raw); } catch(e) { data = {salary:0, commitments:[], expenses:{}, payments:{}}; }
  }
  if (!data.payments) data.payments = {};
  // Restore salary input
  document.getElementById('salaryInput').value = data.salary || '';
  renderCommits();
  recalcSetup();
  renderCommitmentsTracker();

  // Auto-open setup if no salary set
  if (!data.salary) {
    document.getElementById('setupBody').classList.add('open');
    document.getElementById('setupArrow').classList.add('open');
  }
}

load();
renderCalendar();
</script>
