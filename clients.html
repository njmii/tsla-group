
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TSLA Client Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#f7f8fa;color:#111}
.header{background:#fff;border-bottom:1px solid #eee;padding:10px;display:flex;justify-content:center}
.logo{width:52px}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.05);margin-bottom:18px}
.title{font-size:1.6rem;font-weight:800;margin-bottom:16px}
.input{width:100%;padding:14px;border:2px solid #eee;border-radius:14px;font-size:16px;margin-bottom:10px}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-weight:700;margin-top:8px;cursor:pointer}
.primary{background:#ff7a00;color:#fff}
.secondary{background:#25D366;color:#fff}
.client{border:1px solid #eee;border-radius:14px;padding:14px;margin-top:10px}
.name{font-size:18px;font-weight:700}
.small{color:#666;margin-top:4px}
</style>
</head>
<body>

<div class="header">
<img class="logo" src="https://njmii.github.io/tsla-group/assets/tslalogo.png">
</div>

<div class="container">

<div class="card">
<div class="title">👥 Client Manager</div>

<input id="name" class="input" placeholder="Client Name">
<input id="ic" class="input" placeholder="IC Number">
<input id="phone" class="input" placeholder="Phone Number">
<input id="certificate" class="input" placeholder="Certificate Number">
<input id="bank" class="input" placeholder="Bank Name">
<input id="account" class="input" placeholder="Account Number">
<input id="holder" class="input" placeholder="Account Holder">

<button class="btn primary" onclick="saveClient()">➕ Save Client</button>
</div>

<div class="card">
<div class="title">📋 Clients</div>
<div id="list"></div>
</div>

</div>

<script>

let clients = JSON.parse(localStorage.getItem("tslaClients")) || [];

function render(){

const list = document.getElementById("list");
list.innerHTML = "";

clients.forEach(function(client){

const card = document.createElement("div");
card.className = "client";

card.innerHTML =
'<div class="name">'+(client.name||"-")+'</div>'+
'<div class="small">'+(client.ic||"-")+'</div>'+
'<div class="small">'+(client.phone||"-")+'</div>'+
'<button class="btn secondary" onclick="openClient("></button>';

const btn=document.createElement("button");
btn.className="btn secondary";
btn.textContent="Open";
btn.onclick=function(){openClient(client.id);};

card.appendChild(btn);
list.appendChild(card);

});

}

function saveClient(){

const client = {
id:Date.now().toString(),
name:document.getElementById("name").value,
ic:document.getElementById("ic").value,
phone:document.getElementById("phone").value,
certificate:document.getElementById("certificate").value,
bank:document.getElementById("bank").value,
account:document.getElementById("account").value,
holder:document.getElementById("holder").value
};

clients.push(client);

localStorage.setItem("tslaClients",JSON.stringify(clients));

["name","ic","phone","certificate","bank","account","holder"].forEach(function(id){
document.getElementById(id).value="";
});

render();

}

function openClient(id){

const client = clients.find(function(c){
return c.id===id;
});

localStorage.setItem("tslaClient",JSON.stringify(client));

alert("Current client:\n"+client.name);

}

render();

</script>

</body>
</html>
