<!DOCTYPE html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>TSLA Clients</title>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.3/dist/signature_pad.umd.min.js"></script>
<style>
*{box-sizing:border-box;font-family:-apple-system,Segoe UI,sans-serif}
body{margin:0;background:#f5f5f7}.header{position:sticky;top:0;background:#f5f5f7;padding:14px 16px}
a{color:#ff7a00;text-decoration:none;font-weight:700}.search{width:100%;margin-top:10px;padding:14px;border:none;border-radius:14px}
.card{background:#fff;margin:10px 16px;padding:16px;border-radius:18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee}.row:last-child{border:none}
.btn{background:#22c55e;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-weight:700}
.fab{position:fixed;right:20px;bottom:20px;width:62px;height:62px;border:none;border-radius:50%;background:#e53935;color:#fff;font-size:36px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end}
.sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:18px}
input{width:100%;padding:13px;margin:7px 0;border:1px solid #ddd;border-radius:12px}
.actions{display:flex;gap:10px}.actions button{flex:1;padding:13px;border:none;border-radius:12px;font-weight:700}
.save{background:#ff7a00;color:#fff}.cancel{background:#eee}.small{color:#666;font-size:13px}.ok{color:#0a9b43}.pending{color:#c77700}
</style></head><body>
<div class='header'><a href='index.html'>← Back</a><input id='q' class='search' placeholder='🔍 Search' oninput='render()'>
<div style='margin-top:8px'><select id='sortBy' onchange='render()' style='border:2px solid #eee;border-radius:12px;padding:8px 12px;font-size:.85rem;font-weight:700;background:white;color:#111;width:100%'><option value='name'>A – Z</option><option value='followup'>Follow-up Date</option><option value='recent'>Recently Opened</option></select></div></div>
<div id='stats'></div><div id='followups'></div><div id='last'></div><div class='card'><div id='list'></div></div>
<button class='fab' onclick='showAdd()'>+</button>
<button class='fab' onclick='toggleBlast()' id='blastFab' style='bottom:90px;background:#25D366;font-size:24px'>📢</button>

<div class='card' style='margin-top:10px'>
<div style='display:flex;justify-content:space-between;align-items:center;cursor:pointer' onclick='toggleSettings()'>
  <h3 style='font-size:1rem;font-weight:800;margin:0'>⚙️ Settings</h3>
  <span id='settingsArrow' style='font-size:1.1rem;color:#888'>▼</span>
</div>
<div id='settingsBody' style='display:none;margin-top:14px'>
  <p style='font-size:12px;color:#888;margin-bottom:8px;font-weight:700'>WITNESS</p>
  <input id='setWitnessName' placeholder='Witness Name'>
  <input id='setWitnessIc' placeholder='Witness IC'>
  <input id='setWitnessPhone' placeholder='Witness Phone'>
  <input id='setWitnessAddress' placeholder='Witness Address'>
  <p style='font-size:12px;color:#888;margin:10px 0 6px;font-weight:700'>Witness Signature</p>
  <div style='border:2px solid #eee;border-radius:14px;overflow:hidden;cursor:crosshair;background:#fff'>
    <canvas id='setWitnessSig' style='width:100%;height:120px;display:block'></canvas>
  </div>
  <div style='display:flex;gap:8px;margin-top:8px'>
    <button class='cancel' style='flex:1;padding:10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px' onclick='clearSettingsSig("witness")'>Clear</button>
    <label class='save' style='flex:2;padding:10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center'>
      Upload Signature
      <input type='file' accept='image/*' style='display:none' onchange='uploadSettingsSig(this,"witness")'>
    </label>
  </div>
  <p style='font-size:12px;color:#888;margin:14px 0 8px;font-weight:700'>AGENT</p>
  <input id='setAgentName' placeholder='Agent Name'>
  <input id='setAgentIc' placeholder='Agent IC'>
  <input id='setAgentCode' placeholder='Agent Code'>
  <p style='font-size:12px;color:#888;margin:10px 0 6px;font-weight:700'>Agent Signature</p>
  <div style='border:2px solid #eee;border-radius:14px;overflow:hidden;cursor:crosshair;background:#fff'>
    <canvas id='setAgentSig' style='width:100%;height:120px;display:block'></canvas>
  </div>
  <div style='display:flex;gap:8px;margin-top:8px'>
    <button class='cancel' style='flex:1;padding:10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px' onclick='clearSettingsSig("agent")'>Clear</button>
    <label class='save' style='flex:2;padding:10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center'>
      Upload Signature
      <input type='file' accept='image/*' style='display:none' onchange='uploadSettingsSig(this,"agent")'>
    </label>
  </div>
  <button class='save' style='width:100%;padding:13px;border:none;border-radius:12px;font-weight:700;margin-top:14px;cursor:pointer' onclick='saveSettings()'>💾 Save Settings</button>
  <div id='settingsSaved' style='color:#0a9b43;font-size:13px;text-align:center;margin-top:6px;display:none'>✅ Saved!</div>
  <p style='font-size:12px;color:#888;margin:18px 0 8px;font-weight:700'>BACKUP</p>
  <div style='display:flex;gap:8px'>
    <button class='save' style='flex:1;padding:13px;border:none;border-radius:12px;font-weight:700;cursor:pointer' onclick='downloadBackup()'>📥 Download</button>
    <label class='cancel' style='flex:1;padding:13px;border-radius:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center'>
      📤 Restore
      <input type='file' accept='.json' style='display:none' onchange='restoreBackup(this)'>
    </label>
  </div>
  <p style='font-size:12px;color:#888;margin:18px 0 8px;font-weight:700'>REMINDERS</p>
  <button id='notifBtn' onclick='requestNotifPermission()' style='width:100%;padding:13px;border:none;border-radius:12px;font-weight:700;cursor:pointer;background:#ff7a00;color:white'>🔔 Enable Follow-up Reminders</button>
  <div id='notifStatus' style='font-size:12px;color:#888;margin-top:6px;text-align:center'></div>
</div>
</div>

<div id='m' class='modal'><div class='sheet'>
<h2>Add Client</h2>
<input id='name' placeholder='Name'><input id='ic' placeholder='IC Number'><input id='phone' placeholder='Phone Number'><input id='certificate' placeholder='Certificate Number'><input id='bank' placeholder='Bank'><input id='account' placeholder='Account Number'><input id='holder' placeholder='Account Holder'>
<div class='actions'><button class='cancel' onclick='hide()'>Cancel</button><button class='save' onclick='save()'>Save</button></div>
</div></div>
<script>
let clients=JSON.parse(localStorage.getItem('tslaClients')||'[]');
let activeFilter=null;
let blastMode=false;
let blastSelected=new Set();
function setFilter(f){activeFilter=activeFilter===f?null:f;render();}
function chipStyle(f,bg,color){const on=activeFilter===f;return `background:${on?'#222':bg};border-radius:10px;padding:6px 12px;font-size:.85rem;font-weight:700;color:${on?'#fff':(color||'#111')};cursor:pointer;transition:background .15s`;}
function sig(c){return c.signature?"<span class='ok'>🟢 Signature Saved</span>":"<span class='pending'>⚪ No Signature</span>";}
function tags(c){
 const t=[];
 if(c.biro)t.push("<span class='ok'>✅ Biro</span>");
 if(c.servicingPend)t.push("<span style='color:#c77700;font-weight:700'>🔄 Servicing Pending</span>");
 if(c.servicingSettle)t.push("<span style='color:#0a9b43;font-weight:700'>✔ Servicing Settle</span>");
 return t.join(' &nbsp;');
}
function followUpBadge(c){
 if(!c.followUpDate)return '';
 const today=new Date().toISOString().split('T')[0];
 const late=c.followUpDate<today;
 const [y,m,d]=c.followUpDate.split('-');
 return `<span style="color:${late?'#e53935':'#888'};font-weight:700">📅 ${d}/${m}/${y}${late?' ⚠️':''}</span>`;
}
function currentObj(){
 const id=localStorage.getItem('tslaCurrentClientId');
 return clients.find(x=>String(x.id)===String(id));
}
function render(){
 clients=JSON.parse(localStorage.getItem('tslaClients')||'[]');
 const term=document.getElementById('q').value.toLowerCase();
 const today=new Date().toISOString().split('T')[0];
 const overdue=clients.filter(c=>c.followUpDate&&c.followUpDate<=today).length;
 const nonBiro=clients.filter(c=>!c.biro).length;
 const unmarked=clients.filter(c=>!c.biro&&!c.servicingPend&&!c.servicingSettle).length;
 document.getElementById('stats').innerHTML=`<div style='display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 4px'><span onclick="setFilter(null)" style="${chipStyle(null,'#f0f0f0','#111')}">👥 ${clients.length} All</span><span onclick="setFilter('biro')" style="${chipStyle('biro','#e8f5e9','#0a9b43')}">✅ ${clients.filter(c=>c.biro).length} Biro</span><span onclick="setFilter('nonBiro')" style="${chipStyle('nonBiro','#fce4ec','#c62828')}">⚠️ ${nonBiro} Non Biro</span><span onclick="setFilter('pending')" style="${chipStyle('pending','#fff8e1','#c77700')}">🔄 ${clients.filter(c=>c.servicingPend).length} Pending</span><span onclick="setFilter('unmarked')" style="${chipStyle('unmarked','#eeeeee','#555')}">⬜ ${unmarked} Unmarked</span>${overdue?`<span onclick="setFilter('overdue')" style="${chipStyle('overdue','#ffebee','#e53935')}">⏰ ${overdue} Overdue</span>`:''}</div>`;
 const lastClient=currentObj();
 document.getElementById('last').innerHTML=lastClient?`<div class='card'><b>⭐ Last Opened</b><div style='margin-top:8px'><b>${lastClient.name||''}</b><div class='small'>${lastClient.phone||''}</div><div>${sig(lastClient)}</div><button class='btn' onclick="openClient('${lastClient.id}')">Open</button></div></div>`:'';
 const due=clients.filter(c=>c.followUpDate&&c.followUpDate<=today);
 document.getElementById('followups').innerHTML=due.length?`<div class='card' style='border-left:4px solid #e53935'><b>⏰ Follow-ups Due (${due.length})</b>${due.map(c=>`<div class='row'><div><b>${c.name||''}</b><div class='small'>${followUpBadge(c)}</div></div><button class='btn' onclick="openClient('${c.id}')">Open</button></div>`).join('')}</div>`:'';
 const sort=document.getElementById('sortBy').value;
 let filtered=clients.filter(c=>!term||[c.name,c.ic,c.phone,c.certificate].join(' ').toLowerCase().includes(term));
 if(activeFilter==='biro') filtered=filtered.filter(c=>c.biro);
 else if(activeFilter==='nonBiro') filtered=filtered.filter(c=>!c.biro);
 else if(activeFilter==='pending') filtered=filtered.filter(c=>c.servicingPend);
 else if(activeFilter==='overdue') filtered=filtered.filter(c=>c.followUpDate&&c.followUpDate<=today);
 else if(activeFilter==='unmarked') filtered=filtered.filter(c=>!c.biro&&!c.servicingPend&&!c.servicingSettle);
 if(sort==='name') filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
 else if(sort==='followup') filtered.sort((a,b)=>{if(!a.followUpDate&&!b.followUpDate)return 0;if(!a.followUpDate)return 1;if(!b.followUpDate)return -1;return a.followUpDate.localeCompare(b.followUpDate);});
 else if(sort==='recent') filtered.sort((a,b)=>(b.lastOpened||0)-(a.lastOpened||0));
 let h='';
 filtered.forEach(c=>{
  if(blastMode){
   const on=blastSelected.has(c.id);
   h+=`<div class='row' onclick="toggleSelect('${c.id}')" style='cursor:pointer;background:${on?'#f0fff4':''}'>
    <div style='display:flex;align-items:center;gap:12px'>
     <div style='width:26px;height:26px;border-radius:50%;border:2px solid ${on?'#22c55e':'#ccc'};background:${on?'#22c55e':'white'};display:flex;align-items:center;justify-content:center;color:white;font-weight:700;flex-shrink:0'>${on?'✓':''}</div>
     <div><b>${c.name||''}</b><div class='small'>${c.phone||''}</div></div>
    </div>
   </div>`;
  } else {
   h+=`<div class='row'><div><b>${c.name||''}</b><div class='small'>${c.phone||''}</div><div class='small'>${sig(c)} &nbsp;${tags(c)}</div><div class='small'>${followUpBadge(c)}</div></div><button class='btn' onclick="openClient('${c.id}')">Open</button></div>`;
  }
 });
 document.getElementById('list').innerHTML=h||"<div class='small'>👥 No clients yet</div>";
 if(blastMode){
  document.getElementById('list').insertAdjacentHTML('afterend',`<div id='blastBar' style='position:fixed;bottom:0;left:0;right:0;background:white;padding:14px 16px;box-shadow:0 -2px 12px rgba(0,0,0,.1);display:flex;gap:10px;align-items:center;z-index:200'><div style='flex:1;font-weight:700'>${blastSelected.size} selected</div><button onclick='openBlastSheet()' style='padding:12px 20px;border:none;border-radius:12px;font-weight:700;cursor:pointer;background:#ff7a00;color:white'>📢 Compose</button></div>`);
 }
}
function openClient(id){
 const arr=JSON.parse(localStorage.getItem('tslaClients')||'[]');
 const idx=arr.findIndex(x=>String(x.id)===String(id));
 if(idx>=0){arr[idx].lastOpened=Date.now();localStorage.setItem('tslaClients',JSON.stringify(arr));}
 localStorage.setItem('tslaCurrentClientId',String(id));
 location.href='client-profile.html';
}
function showAdd(){
 ['name','ic','phone','certificate','bank','account','holder'].forEach(x=>document.getElementById(x).value='');
 document.getElementById('m').style.display='flex';
}
function hide(){document.getElementById('m').style.display='none';}
function save(){
 const nm=document.getElementById('name').value;
 const ph=document.getElementById('phone').value;
 if(!nm.trim()||!ph.trim())return alert('Name and Phone required');
 const icVal=document.getElementById('ic').value.trim();
 if(icVal){const dup=clients.find(x=>x.ic&&x.ic.replace(/\D/g,'')===icVal.replace(/\D/g,''));if(dup&&!confirm(`⚠️ A client with this IC already exists:\n"${dup.name||'Unknown'}"\n\nSave anyway?`))return;}
 const c={id:Date.now().toString(),name:nm,ic:document.getElementById('ic').value,phone:ph,certificate:document.getElementById('certificate').value,bank:document.getElementById('bank').value,account:document.getElementById('account').value,holder:document.getElementById('holder').value};
 clients.unshift(c);
 localStorage.setItem('tslaClients',JSON.stringify(clients));
 localStorage.setItem('tslaCurrentClientId',String(c.id));
 hide();render();
}
render();

let setWitnessPad, setAgentPad, _settingsPadsInit = false;

function toggleSettings(){
  const body=document.getElementById('settingsBody');
  const arrow=document.getElementById('settingsArrow');
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  arrow.textContent=open?'▼':'▲';
  if(!open&&!_settingsPadsInit) initSettingsPads();
}

function initSettingsPads(){
  _settingsPadsInit=true;
  const wc=document.getElementById('setWitnessSig');
  wc.width=wc.offsetWidth||400; wc.height=120;
  setWitnessPad=new SignaturePad(wc,{penColor:'#111'});
  const ac=document.getElementById('setAgentSig');
  ac.width=ac.offsetWidth||400; ac.height=120;
  setAgentPad=new SignaturePad(ac,{penColor:'#111'});
  const w=JSON.parse(localStorage.getItem('tslaWitness')||'{}');
  const a=JSON.parse(localStorage.getItem('tslaAgentProfile')||'{}');
  if(w.signature) _drawToCanvas(wc,w.signature);
  if(a.agentSignature) _drawToCanvas(ac,a.agentSignature);
}

function _drawToCanvas(canvas,dataUrl){
  const img=new Image();
  img.onload=()=>canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
  img.src=dataUrl;
}

function clearSettingsSig(type){
  if(type==='witness'&&setWitnessPad) setWitnessPad.clear();
  if(type==='agent'&&setAgentPad) setAgentPad.clear();
}

async function _makeTransparent(data){
  const img=new Image();
  await new Promise(r=>{img.onload=r;img.src=data;});
  const cv=document.createElement('canvas');
  cv.width=img.width;cv.height=img.height;
  const ctx=cv.getContext('2d');
  ctx.drawImage(img,0,0);
  const d=ctx.getImageData(0,0,cv.width,cv.height);
  for(let i=0;i<d.data.length;i+=4){
    if(d.data[i]>235&&d.data[i+1]>235&&d.data[i+2]>235)d.data[i+3]=0;
  }
  ctx.putImageData(d,0,0);
  return cv.toDataURL('image/png');
}

function uploadSettingsSig(input,type){
  if(!input.files[0])return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const transparent=await _makeTransparent(e.target.result);
    const pad=type==='witness'?setWitnessPad:setAgentPad;
    const canvas=document.getElementById(type==='witness'?'setWitnessSig':'setAgentSig');
    const img=new Image();
    img.onload=()=>{
      pad.clear();
      const scale=Math.min(canvas.width/img.width,canvas.height/img.height);
      const w=img.width*scale,h=img.height*scale;
      canvas.getContext('2d').drawImage(img,(canvas.width-w)/2,(canvas.height-h)/2,w,h);
    };
    img.src=transparent;
  };
  reader.readAsDataURL(input.files[0]);
}

function saveSettings(){
  const wn=document.getElementById('setWitnessName').value;
  const wi=document.getElementById('setWitnessIc').value;
  const wp=document.getElementById('setWitnessPhone').value;
  const wa=document.getElementById('setWitnessAddress').value;
  const an=document.getElementById('setAgentName').value;
  const ai=document.getElementById('setAgentIc').value;
  const ac=document.getElementById('setAgentCode').value;
  const existW=JSON.parse(localStorage.getItem('tslaWitness')||'{}');
  const existA=JSON.parse(localStorage.getItem('tslaAgentProfile')||'{}');
  const wSig=(setWitnessPad&&!setWitnessPad.isEmpty())?setWitnessPad.toDataURL():(existW.signature||null);
  const aSig=(setAgentPad&&!setAgentPad.isEmpty())?setAgentPad.toDataURL():(existA.agentSignature||null);
  localStorage.setItem('tslaWitness',JSON.stringify({name:wn,ic:wi,phone:wp,address:wa,signature:wSig}));
  localStorage.setItem('tslaAgentProfile',JSON.stringify({witnessName:wn,witnessIc:wi,agentName:an,agentIc:ai,agentCode:ac,agentSignature:aSig}));
  const el=document.getElementById('settingsSaved');
  el.style.display='block';setTimeout(()=>el.style.display='none',2000);
}

function downloadBackup(){
  const data={version:1,exportedAt:new Date().toISOString(),clients:JSON.parse(localStorage.getItem('tslaClients')||'[]'),witness:JSON.parse(localStorage.getItem('tslaWitness')||'{}'),agentProfile:JSON.parse(localStorage.getItem('tslaAgentProfile')||'{}')};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download=`tsla-backup-${new Date().toISOString().split('T')[0]}.json`;
  link.click();
}
function restoreBackup(input){
  if(!input.files[0])return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.clients||!Array.isArray(data.clients)){alert('Invalid backup file');return;}
      if(!confirm(`Restore ${data.clients.length} client(s) from backup?\nThis will replace all current data.`))return;
      localStorage.setItem('tslaClients',JSON.stringify(data.clients));
      if(data.witness)localStorage.setItem('tslaWitness',JSON.stringify(data.witness));
      if(data.agentProfile)localStorage.setItem('tslaAgentProfile',JSON.stringify(data.agentProfile));
      alert('Backup restored!');
      render();
    }catch(err){alert('Failed to restore: '+err.message);}
    input.value='';
  };
  reader.readAsText(input.files[0]);
}
(function loadSettings(){
  const w=JSON.parse(localStorage.getItem('tslaWitness')||'{}');
  const a=JSON.parse(localStorage.getItem('tslaAgentProfile')||'{}');
  document.getElementById('setWitnessName').value=w.name||'';
  document.getElementById('setWitnessIc').value=w.ic||'';
  document.getElementById('setWitnessPhone').value=w.phone||'';
  document.getElementById('setWitnessAddress').value=w.address||'';
  document.getElementById('setAgentName').value=a.agentName||'';
  document.getElementById('setAgentIc').value=a.agentIc||'';
  document.getElementById('setAgentCode').value=a.agentCode||'';
  updateNotifBtn();
})();
function toggleBlast(){
 blastMode=!blastMode;
 blastSelected.clear();
 const fab=document.getElementById('blastFab');
 fab.style.background=blastMode?'#ff7a00':'#25D366';
 fab.textContent=blastMode?'✕':'📢';
 const bar=document.getElementById('blastBar');
 if(bar)bar.remove();
 render();
}
function toggleSelect(id){
 if(blastSelected.has(id))blastSelected.delete(id);
 else blastSelected.add(id);
 render();
}
function selectAll(){
 const arr=JSON.parse(localStorage.getItem('tslaClients')||'[]');
 arr.filter(c=>c.phone).forEach(c=>blastSelected.add(c.id));
 render();
 updateBlastCount();
}
function clearSel(){
 blastSelected.clear();
 render();
 updateBlastCount();
}
function updateBlastCount(){
 const el=document.getElementById('blastCount');
 if(el)el.textContent=`${blastSelected.size} client${blastSelected.size===1?'':'s'} selected`;
}
function openBlastSheet(){
 if(!blastSelected.size)return alert('Select at least one client first');
 updateBlastCount();
 document.getElementById('blastMsg').value='';
 document.getElementById('blastSheet').style.display='flex';
}
function closeBlastSheet(){
 document.getElementById('blastSheet').style.display='none';
}
function sendBlast(){
 const msg=document.getElementById('blastMsg').value.trim();
 const arr=JSON.parse(localStorage.getItem('tslaClients')||'[]');
 const recipients=arr.filter(c=>blastSelected.has(c.id)&&c.phone);
 if(!recipients.length)return alert('No clients with phone numbers selected');
 closeBlastSheet();
 recipients.forEach((c,i)=>{
  const raw=c.phone.replace(/[^0-9]/g,'');
  const wa=raw.startsWith('60')?raw:raw.startsWith('0')?'6'+raw:'60'+raw;
  const url='https://wa.me/'+wa+(msg?'?text='+encodeURIComponent(msg):'');
  setTimeout(()=>window.open(url,'_blank'),i*600);
 });
 toggleBlast();
}
function checkAndNotify(){
 if(Notification.permission!=='granted')return;
 const cls=JSON.parse(localStorage.getItem('tslaClients')||'[]');
 const today=new Date().toISOString().split('T')[0];
 const overdue=cls.filter(c=>c.followUpDate&&c.followUpDate<=today);
 if(!overdue.length)return;
 const body=overdue.length===1?`Follow up with ${overdue[0].name||'a client'} today`:`${overdue.length} clients need follow-up today`;
 new Notification('TSLA – Follow-up Reminder',{body,icon:'assets/tslalogo.png'});
}
function requestNotifPermission(){
 if(!('Notification' in window)){document.getElementById('notifStatus').textContent='Notifications not supported.';return;}
 Notification.requestPermission().then(p=>{
  const el=document.getElementById('notifStatus');
  const btn=document.getElementById('notifBtn');
  if(p==='granted'){el.textContent='✅ Reminders enabled';btn.style.background='#eee';btn.style.color='#333';checkAndNotify();}
  else{el.textContent='⚠️ Permission denied — enable in browser settings';}
 });
}
function updateNotifBtn(){
 const btn=document.getElementById('notifBtn');
 const el=document.getElementById('notifStatus');
 if(!btn)return;
 const p=Notification.permission;
 if(p==='granted'){btn.style.background='#eee';btn.style.color='#333';el.textContent='✅ Reminders enabled';}
 else if(p==='denied'){el.textContent='⚠️ Blocked — enable in browser settings';}
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
checkAndNotify();
</script>
