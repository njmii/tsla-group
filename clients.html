
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>TSLA Client Manager v2.0</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:0}
body{background:#f7f8fa;color:#111}
.wrap{max-width:900px;margin:auto;padding:18px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 3px 16px rgba(0,0,0,.06);margin-bottom:18px}
h2{margin-bottom:14px}
input{width:100%;padding:14px;margin:7px 0;border:2px solid #eee;border-radius:12px;font-size:16px}
button{width:100%;padding:14px;border:none;border-radius:12px;margin-top:8px;font-weight:700;cursor:pointer}
.orange{background:#ff7a00;color:#fff}.green{background:#25D366;color:#fff}.red{background:#e53935;color:#fff}
.client{border:1px solid #eee;border-radius:12px;padding:12px;margin-top:10px}
.small{color:#666;font-size:14px}
</style>
</head>
<body>
<div class="wrap"><a href="index.html" style="display:inline-block;margin:0 0 14px 4px;text-decoration:none;font-weight:700;color:#ff7a00;">← Home</a>
<div class="card">
<h2>👥 Client Manager</h2>
<input id="name" placeholder="Name"/>
<input id="ic" placeholder="IC"/>
<input id="phone" placeholder="Phone"/>
<input id="certificate" placeholder="Certificate"/>
<input id="bank" placeholder="Bank"/>
<input id="account" placeholder="Account"/>
<input id="holder" placeholder="Account Holder"/>
<button class="orange" onclick="saveNew()">➕ Save New Client</button>
<button class="green" onclick="updateClient()">💾 Update Client</button>
<button class="red" onclick="deleteClient()">🗑 Delete Client</button>
</div><div class="card"><h2>⭐ Recent Clients</h2><div id="recent"></div></div>
<div class="card">
<h2>📋 Clients</h2><input id="search" oninput="render()" placeholder="🔍 Search Client"/>
<div id="list"></div>
</div>
</div>
<script>
let clients=JSON.parse(localStorage.getItem("tslaClients"))||[];
let selectedId=null;
let recent=JSON.parse(localStorage.getItem("tslaRecentClients"))||[];

function val(id){return document.getElementById(id).value;}
function setv(id,v){document.getElementById(id).value=v||"";}

function renderRecent(){
 const list=document.getElementById("recent");
 if(!list)return;
 list.innerHTML="";
 recent.forEach(r=>{
   const d=document.createElement("div");
   d.className="client";
   d.innerHTML="<b>"+(r.name||"-")+"</b><div class='small'>"+(r.phone||"")+"</div>";
   const b=document.createElement("button");
   b.className="green";
   b.textContent="Open";
   b.onclick=()=>openClient(r.id);
   d.appendChild(b);
   list.appendChild(d);
 });
}

function persist(){
 localStorage.setItem("tslaClients",JSON.stringify(clients));
 render();
 renderRecent();
}

function clearForm(){
["name","ic","phone","certificate","bank","account","holder"].forEach(i=>setv(i,""));
selectedId=null;
}

function saveNew(){
const c={id:Date.now().toString(),name:val("name"),ic:val("ic"),phone:val("phone"),certificate:val("certificate"),bank:val("bank"),account:val("account"),holder:val("holder")};
if(clients.some(x=>x.ic&&c.ic&&x.ic===c.ic)){alert("Duplicate IC detected");return;}
clients.push(c);persist();clearForm();
}

function openClient(id){
const c=clients.find(x=>x.id===id);
if(!c)return;
selectedId=id;
setv("name",c.name);setv("ic",c.ic);setv("phone",c.phone);setv("certificate",c.certificate);setv("bank",c.bank);setv("account",c.account);setv("holder",c.holder);
localStorage.setItem("tslaClient",JSON.stringify(c));
recent=[c].concat(recent.filter(x=>x.id!==c.id)).slice(0,5);
localStorage.setItem("tslaRecentClients",JSON.stringify(recent));
renderRecent();
}

function updateClient(){
if(!selectedId){alert("Open a client first");return;}
const i=clients.findIndex(x=>x.id===selectedId);
if(i<0)return;
clients[i]={id:selectedId,name:val("name"),ic:val("ic"),phone:val("phone"),certificate:val("certificate"),bank:val("bank"),account:val("account"),holder:val("holder")};
localStorage.setItem("tslaClient",JSON.stringify(clients[i]));
persist();
}

function deleteClient(){
if(!selectedId){alert("Open a client first");return;}
if(!confirm("Delete client?"))return;
clients=clients.filter(x=>x.id!==selectedId);
localStorage.removeItem("tslaClient");
persist();clearForm();
}

function render(){
const list=document.getElementById("list");
list.innerHTML="";
const q=(document.getElementById("search")?.value||"").toLowerCase();
clients.filter(c=>!q||(c.name||"").toLowerCase().includes(q)||(c.ic||"").toLowerCase().includes(q)||(c.phone||"").toLowerCase().includes(q)).forEach(c=>{
 const d=document.createElement("div");
 d.className="client";
 d.innerHTML="<b>"+(c.name||"-")+"</b><div class='small'>"+(c.ic||"")+"</div><div class='small'>"+(c.phone||"")+"</div>";
 const b=document.createElement("button");
 b.className="green";b.textContent="Open";b.onclick=()=>openClient(c.id);
 d.appendChild(b);list.appendChild(d);
});
}
render();
renderRecent();

</script>
</body>
</html>
