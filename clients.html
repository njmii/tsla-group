<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TSLA Client Manager</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{background:#f7f8fa;color:#111}.header{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;padding:10px;display:flex;justify-content:center}.logo{width:52px}.container{max-width:900px;margin:auto;padding:20px}.card{background:#fff;border-radius:24px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.05);margin-bottom:18px}.title{font-size:1.7rem;font-weight:800;margin-bottom:16px}.input{width:100%;padding:14px;border:2px solid #eee;border-radius:16px;font-size:16px;margin-bottom:10px}.input:focus{border-color:#ff7a00;outline:none}.btn{width:100%;padding:15px;border:none;border-radius:16px;font-weight:700;font-size:16px;cursor:pointer;margin-top:8px}.primary{background:#ff7a00;color:#fff}.secondary{background:#25D366;color:#fff}.client{border:1px solid #eee;border-radius:18px;padding:15px;margin-top:12px}.name{font-weight:800;font-size:18px}.small{color:#666;margin-top:4px}</style></head><body><div class="header"><img src="https://njmii.github.io/tsla-group/assets/tslalogo.png" class="logo"></div><div class="container"><div class="card"><div class="title">👥 Client Manager</div><input id="name" class="input" placeholder="Client Name"><input id="ic" class="input" placeholder="IC Number"><input id="phone" class="input" placeholder="Phone Number"><input id="certificate" class="input" placeholder="Certificate Number"><input id="bank" class="input" placeholder="Bank Name"><input id="account" class="input" placeholder="Account Number"><input id="holder" class="input" placeholder="Account Holder"><button class="btn primary" onclick="saveClient()">➕ Save Client</button></div><div class="card"><div class="title">📋 Clients</div><div id="list"></div></div></div><script>let clients=JSON.parse(localStorage.getItem('tslaClients'))||[];function render(){const list=document.getElementById('list');list.innerHTML='';clients.forEach(client=>{const div=document.createElement('div');div.className='client';div.innerHTML=`<div class="name">${client.name}</div><div class="small">${client.ic}</div><div class="small">${client.phone}</div><button class="btn secondary" onclick="openClient('${client.id}')">Open</button>`;list.appendChild(div);});}function saveClient(){const client={id:Date.now().toString(),name:name.value,ic:ic.value,phone:phone.value,certificate:certificate.value,bank:bank.value,account:account.value,holder:holder.value};clients.push(client);localStorage.setItem('tslaClients',JSON.stringify(clients));['name','ic','phone','certificate','bank','account','holder'].forEach(i=>document.getElementById(i).value='');render();}function openClient(id){const client=clients.find(c=>c.id===id);localStorage.setItem('tslaClient',JSON.stringify(client));alert('Current client: '+client.name);}render();</script></body></html>
