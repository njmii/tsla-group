<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TSLA Client Manager v2.1</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:0}
body{background:#f7f8fa;color:#111}
.wrap{max-width:900px;margin:auto;padding:18px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 3px 16px rgba(0,0,0,.06);margin-bottom:18px}
h2{margin-bottom:14px}
input{width:100%;padding:14px;margin:7px 0;border:2px solid #eee;border-radius:12px;font-size:16px}
button{width:100%;padding:14px;border:none;border-radius:12px;margin-top:8px;font-weight:700;cursor:pointer}
.orange{background:#ff7a00;color:#fff}.green{background:#25D366;color:#fff}.red{background:#e53935;color:#fff}
.client{border:1px solid #eee;border-radius:12px;padding:12px;margin-top:10px}
.small{color:#666;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
<a href="index.html" style="display:inline-block;margin:0 0 14px 4px;text-decoration:none;font-weight:700;color:#ff7a00;">← Home</a>

<div class="card">
<h2>👥 Client Manager</h2>
<input id="name" placeholder="Name">
<input id="ic" placeholder="IC">
<input id="phone" placeholder="Phone">
<input id="certificate" placeholder="Certificate">
<input id="bank" placeholder="Bank">
<input id="account" placeholder="Account">
<input id="holder" placeholder="Account Holder">
<button class="orange" onclick="saveNew()">➕ Save New Client</button>
<button class="green" onclick="updateClient()">💾 Update Client</button>
<button class="red" onclick="deleteClient()">🗑 Delete Client</button>
</div>

<div class="card">
<h2>✍️ Client Signature</h2>
<div id="sigStatus" class="small">❌ No Signature</div>
<button class="orange" onclick="location.href='client-signature.html'">Manage Signature</button>
</div>

<div class="card"><h2>⭐ Recent Clients</h2><div id="recent"></div></div>
<div class="card">
<h2>📋 Clients</h2>
<input id="search" placeholder="🔍 Search Client" oninput="render()">
<div id="list"></div>
</div>
</div>

<script>
let clients=JSON.parse(localStorage.getItem("tslaClients"))||[];
let recent=JSON.parse(localStorage.getItem("tslaRecentClients"))||[];
let selectedId=null;
function v(id){return document.getElementById(id).value}
function s(id,x){document.getElementById(id).value=x||""}
function persist(){localStorage.setItem("tslaClients",JSON.stringify(clients));render();renderRecent();}
function saveNew(){
 const c={id:Date.now().toString(),name:v("name"),ic:v("ic"),phone:v("phone"),certificate:v("certificate"),bank:v("bank"),account:v("account"),holder:v("holder")};
 clients.push(c);persist();
}
function openClient(id){
 const c=clients.find(x=>x.id===id);if(!c)return;
 selectedId=id;
 ["name","ic","phone","certificate","bank","account","holder"].forEach(k=>s(k,c[k]));
 localStorage.setItem("tslaClient",JSON.stringify(c));
 recent=[c].concat(recent.filter(x=>x.id!==c.id)).slice(0,5);
 localStorage.setItem("tslaRecentClients",JSON.stringify(recent));
 renderRecent();updateSig();
}
function updateClient(){
 if(!selectedId)return alert("Open a client first");
 const i=clients.findIndex(x=>x.id===selectedId);
 clients[i]={...clients[i],name:v("name"),ic:v("ic"),phone:v("phone"),certificate:v("certificate"),bank:v("bank"),account:v("account"),holder:v("holder")};
 localStorage.setItem("tslaClient",JSON.stringify(clients[i]));persist();updateSig();
}
function deleteClient(){
 if(!selectedId)return alert("Open a client first");
 clients=clients.filter(x=>x.id!==selectedId);
 localStorage.removeItem("tslaClient");persist();selectedId=null;
}
function render(){
 const q=(document.getElementById("search").value||"").toLowerCase();
 const list=document.getElementById("list");list.innerHTML="";
 clients.filter(c=>!q||(c.name||"").toLowerCase().includes(q)).forEach(c=>{
  const d=document.createElement("div");d.className="client";
  d.innerHTML="<b>"+(c.name||"-")+"</b><div class='small'>"+(c.ic||"")+"</div>";
  const b=document.createElement("button");b.className="green";b.textContent="Open";b.onclick=()=>openClient(c.id);
  d.appendChild(b);list.appendChild(d);
 });
}
function renderRecent(){
 const r=document.getElementById("recent");r.innerHTML="";
 recent.forEach(c=>{
  const d=document.createElement("div");d.className="client";
  d.innerHTML="<b>"+c.name+"</b>";
  const b=document.createElement("button");b.className="green";b.textContent="Open";b.onclick=()=>openClient(c.id);
  d.appendChild(b);r.appendChild(d);
 });
}
function updateSig(){
 const c=JSON.parse(localStorage.getItem("tslaClient")||"null");
 document.getElementById("sigStatus").textContent=(c&&c.signature)?"✅ Signature Saved":"❌ No Signature";
}
render();renderRecent();updateSig();
</script>
</body>
</html>
