<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>TSLA Signature Test</title>
<style>
body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding:20px}
.card{background:#fff;border-radius:16px;padding:16px;max-width:800px;margin:auto}
canvas{width:100%;height:180px;border:2px solid #bbb;border-radius:12px;touch-action:none;background:#fff}
button{width:100%;padding:12px;margin:10px 0;border:none;border-radius:10px;background:#ff7a00;color:#fff;font-weight:700}
</style>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.3/dist/signature_pad.umd.min.js"></script>
</head><body><div class='card'>
<h2>TSLA Signature Test</h2>
<h3>Witness Signature</h3>
<canvas id='w'></canvas><button onclick='wpad.clear()'>Clear Witness</button>
<h3>Agent Signature</h3>
<canvas id='a'></canvas><button onclick='apad.clear()'>Clear Agent</button>
<button onclick='test()'>Test Export</button>
<p id='msg'></p>
</div>
<script>
function fit(c){const r=c.getBoundingClientRect();c.width=r.width;c.height=180;}
const wc=document.getElementById('w'),ac=document.getElementById('a');
fit(wc);fit(ac);
const wpad=new SignaturePad(wc);const apad=new SignaturePad(ac);
window.addEventListener('resize',()=>{fit(wc);fit(ac);});
function test(){
 const ok=!wpad.isEmpty()||!apad.isEmpty();
 document.getElementById('msg').textContent=ok?'✅ Signature export OK':'⚠️ Draw something first';
 if(!wpad.isEmpty()) console.log(wpad.toDataURL());
 if(!apad.isEmpty()) console.log(apad.toDataURL());
}
</script></body></html>
