<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TSLA Price Checker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#050505;
color:white;
min-height:100vh;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

.logo{
display:block;
margin:auto;
width:min(700px,90vw);
margin-bottom:30px;
}

h1{
text-align:center;
font-size:3rem;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#999;
margin-bottom:40px;
}

.search-box{
max-width:500px;
margin:auto;
margin-bottom:50px;
}

.search-box input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:18px;
background:#111;
color:white;
font-size:1.1rem;
}

.results{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:24px;
backdrop-filter:blur(10px);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
}

.plan{
font-size:1.1rem;
margin-bottom:10px;
}

.price{
font-size:2rem;
font-weight:700;
color:#ff3b3b;
}

.year{
margin-bottom:10px;
color:#aaa;
}

.back{
display:inline-block;
margin-bottom:30px;
color:white;
text-decoration:none;
}

.empty{
text-align:center;
color:#888;
font-size:1.1rem;
margin-top:40px;
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">
← Back
</a>

<img
src="https://njmii.github.io/tsla-group/assets/tslalogo.png"
class="logo"
alt="TSLA Logo">

<h1>Price Checker</h1>

<p class="subtitle">
Search by Tahun Lahir
</p>

<div class="search-box">
<input
type="number"
id="yearSearch"
placeholder="Example: 1994">
</div>

<div id="results" class="results"></div>

</div>

<script>

const pricing = {

1994: [
{plan:"110 + 50 (1.5)", price:"RM206.56"},
{plan:"110 + 60 (1.8)", price:"RM226.02"},
{plan:"110 + 70 (2.1)", price:"RM245.48"},
{plan:"110 + 80 (2.4)", price:"RM264.93"},
{plan:"110 + 90 (2.7)", price:"RM284.40"},
{plan:"110 + 100 (3.0)", price:"RM303.80"}
],

1993: [
{plan:"110 + 50 (1.5)", price:"RM206.13"},
{plan:"110 + 60 (1.8)", price:"RM225.63"},
{plan:"110 + 70 (2.1)", price:"RM245.13"},
{plan:"110 + 80 (2.4)", price:"RM264.63"},
{plan:"110 + 90 (2.7)", price:"RM284.13"},
{plan:"110 + 100 (3.0)", price:"RM303.63"}
],

1992: [
{plan:"110 + 50 (1.5)", price:"RM207.29"},
{plan:"110 + 60 (1.8)", price:"RM226.84"},
{plan:"110 + 70 (2.1)", price:"RM246.39"},
{plan:"110 + 80 (2.4)", price:"RM265.94"},
{plan:"110 + 90 (2.7)", price:"RM285.49"},
{plan:"110 + 100 (3.0)", price:"RM305.04"}
],

1991: [
{plan:"100 + 50 (1.5)", price:"RM202.13"},
{plan:"100 + 60 (1.8)", price:"RM222.22"},
{plan:"100 + 70 (2.1)", price:"RM242.32"},
{plan:"100 + 80 (2.4)", price:"RM262.40"},
{plan:"100 + 90 (2.7)", price:"RM282.50"},
{plan:"100 + 100 (3.0)", price:"RM302.59"}
],

1990: [
{plan:"100 + 50 (1.5)", price:"RM202.13"},
{plan:"100 + 60 (1.8)", price:"RM222.22"},
{plan:"110 + 70 (2.1)", price:"RM242.32"},
{plan:"100 + 80 (2.4)", price:"RM262.40"},
{plan:"100 + 90 (2.7)", price:"RM282.50"},
{plan:"100 + 100 (3.0)", price:"RM302.50"}
]

};

const search = document.getElementById("yearSearch");
const results = document.getElementById("results");

search.addEventListener("input", () => {

const year = search.value;

if(!pricing[year]){
results.innerHTML =
'<div class="empty">No quotation found</div>';
return;
}

results.innerHTML = pricing[year]
.map(item => `
<div class="card">

<div class="year">
Female • ${year}
</div>

<div class="plan">
${item.plan}
</div>

<div class="price">
${item.price}
</div>

</div>
`)
.join("");

});

</script>

</body>
</html>
