<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BL714 Grid Mapper</title>
<script src="assets/pdf-lib.min.js"></script>
<style>
body{font-family:Arial;padding:20px}button{padding:12px 18px}
</style></head><body>
<h2>BL714 Coordinate Grid (10-unit gap)</h2>
<button onclick="gen()">Generate Grid PDF</button>
<pre id="log">Ready</pre>
<script>
async function gen(){
try{
const bytes=await fetch("assets/bl714form.pdf").then(r=>r.arrayBuffer());
const pdfDoc=await PDFLib.PDFDocument.load(bytes);
const page=pdfDoc.getPages()[0];
const size=5;
for(let y=800;y>=20;y-=10){
 for(let x=20;x<=560;x+=10){
   page.drawText(x+","+y,{x:x,y:y,size:size});
 }
}
const out=await pdfDoc.save();
const blob=new Blob([out],{type:"application/pdf"});
const u=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=u;a.download="BL714-Grid.pdf";a.click();
URL.revokeObjectURL(u);
log.textContent="Generated";
}catch(e){log.textContent=e.message;alert(e.message);}
}
</script></body></html>
