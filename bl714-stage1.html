<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BL714 Grid Mapper</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;text-align:center;padding:30px}
button{padding:14px 24px;font-size:18px;border:none;border-radius:8px;cursor:pointer}
p{color:#bbb}
</style>
</head>
<body>

<h2>BL714 Grid Mapper</h2>
<p>Loads assets/bl714form.pdf and exports BL714-Grid.pdf</p>

<button onclick="generate()">Generate Grid PDF</button>

<script src="assets/pdf-lib.min.js"></script>

<script>
async function generate(){

const bytes=await fetch("assets/bl714form.pdf").then(r=>r.arrayBuffer());

const pdfDoc=await PDFLib.PDFDocument.load(bytes);

const pages=pdfDoc.getPages();

for(const page of pages){

const w=page.getWidth();
const h=page.getHeight();

for(let y=Math.floor(h);y>=0;y-=10){

for(let x=0;x<=Math.floor(w);x+=10){

page.drawText(x+","+y,{
x:x,
y:y,
size:1.8
});

}

}

}

const pdfBytes=await pdfDoc.save();

const blob=new Blob([pdfBytes],{type:"application/pdf"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="BL714-Grid.pdf";
a.click();

URL.revokeObjectURL(url);

}
</script>

</body>
</html>
