<div class="container">
  <!-- Leaderboard -->
  <div id="viewLeaderboard">
    <div class="page-header">
      <div class="page-title">📊 Agent PR13 Report</div>
      <div class="page-sub">ACE-weighted Persistency Rate — tap an agent for full audit breakdown</div>
      <div class="badge-row">
        <span class="badge badge-grey" id="updatedBadge">Loading…</span>
        <span class="badge badge-blue" id="projBadge">Loading…</span>
        <select id="monthPicker" class="month-picker-sel" onchange="onMonthPick(this.value)"></select>
      </div>
    </div>

  </div>

  <!-- Agent detail -->
  <div id="viewDetail" class="hidden">

    <div class="audit-tab-row">

    <div class="audit-wrap">
      <table id="auditTable">
        <thead>
          <tr>
            <th style="width:44px">#</th>
            <th>Client Name</th>
            <th>Issue Date</th>
            <th>Due Date</th>
            <th>Pay Mode</th>
            <th>ACE (RM)</th>
            <th>Payment Method</th>
            <th>Status</th>
            <th>Classification</th>
            <th>Reason</th>

<script>
/* ── Date helpers ─────────────────────────────────────── */
let PROJ_YEAR, PROJ_MONTH, PROJ_LAST, TODAY_KEY, PREV_MONTH, PREV_YEAR, PREV_KEY;

function setProjectionMonth(year, month) {
  PROJ_YEAR  = year;
  PROJ_MONTH = month;
  PROJ_LAST  = new Date(year, month + 1, 0);
  TODAY_KEY  = year * 12 + month;
  PREV_MONTH = month === 0 ? 11 : month - 1;
  PREV_YEAR  = month === 0 ? year - 1 : year;
  PREV_KEY   = PREV_YEAR * 12 + PREV_MONTH;
}
const _today = new Date(); _today.setHours(0,0,0,0);
setProjectionMonth(_today.getFullYear(), _today.getMonth());

function projLabel() {
  return new Date(PROJ_YEAR, PROJ_MONTH, 1).toLocaleString('en-MY', { month: 'long', year: 'numeric' });
}
function prevLabel() {
  return new Date(PREV_YEAR, PREV_MONTH, 1).toLocaleString('en-MY', { month: 'long', year: 'numeric' });
}

/* ── Formatting ───────────────────────────────────────── */
function R(n) { return 'RM ' + Math.round(n).toLocaleString('en-MY'); }
function RA(n) { return n.toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

/* ── PR13 spec: ×13 annualisation correction list ────────── */
const KNOWN_13_OVER_12 = new Set([
  "AN589839","AN598891","AN602868","AN494145","AN462757","AN500070",
  "AN580946","AN517631","AN500252","AN502773","AN519143","AN528593",
  "AN546050","AN566379"
]);

function getACE(c) {
  if (KNOWN_13_OVER_12.has(c.certNo)) return Math.round(c.contribution * 13 * 100) / 100;
  return c.ace || Math.round(c.contribution * 12 * 100) / 100;
}

/* ── PR13 cohort window helpers ───────────────────────────── */
function pr13Window() {
  const base = PROJ_YEAR * 12 + PROJ_MONTH;
  const weM  = base - 13;
  const wsM  = base - 24;
  // windowEnd = last day of (M − 13 months)
  const windowEnd   = new Date(Math.floor(weM / 12), weM % 12 + 1, 0);
  // windowStart = first day of (M − 24 months)
  const windowStart = new Date(Math.floor(wsM / 12), wsM % 12,     1);
  return { windowStart, windowEnd };
}

/* ── Point-in-time status (back-calculation for past months) ─ */
function pointInTimeStatus(c) {
  if ((c.status === 'Lapsed' || c.status === 'Contract Surrendered') && c.statusUpdatedDate) {
    if (new Date(c.statusUpdatedDate) > PROJ_LAST) return 'In Force';
  }
  return c.status;
}

/* ── Months paid before surrender (issueDate → statusUpdatedDate) ── */
function monthsPaid(c) {
  if (!c.issueDate || !c.statusUpdatedDate) return 0;
  const iss = new Date(c.issueDate);
  const upd = new Date(c.statusUpdatedDate);
  return (upd.getFullYear() - iss.getFullYear()) * 12 + (upd.getMonth() - iss.getMonth());
}

/* ── PR13 classification — rolling 13-24 month cohort ────── */
function classifyPR13(c) {
  if (!c.issueDate) return { cls: 'na', reason: 'No issue date' };
  const issued = new Date(c.issueDate);
  const { windowStart, windowEnd } = pr13Window();
  if (issued < windowStart) return { cls: 'na', reason: 'Aged out (>24 months)' };
  if (issued > windowEnd)   return { cls: 'na', reason: 'Not yet 13 months old' };
  if (c.status === 'Freelook Cancellation') return { cls: 'excl', reason: 'Freelook Cancellation' };
  const eff = pointInTimeStatus(c);
  if (eff === 'In Force') return { cls: '100', reason: 'In Force' };
  if (eff === 'Contract Surrendered') {
    // Already surrendered as of report date: ≥13 months paid → 100%, else 0%
    return monthsPaid(c) >= 13
      ? { cls: '100', reason: 'Contract Surrendered (≥13mo)' }
      : { cls: '0',   reason: 'Contract Surrendered (<13mo)' };
  }
  return { cls: '0', reason: 'Lapsed' };
}

/* ── CE classification — policies < 13 months old ────────── */
function classifyCE(c) {
  if (!c.issueDate) return { cls: 'na', reason: 'No issue date' };
  const issued = new Date(c.issueDate);
  const { windowEnd } = pr13Window();
  if (issued <= windowEnd) return { cls: 'na', reason: 'In PR13 pool or aged out' };
  if (c.status === 'Freelook Cancellation') return { cls: 'excl', reason: 'Freelook Cancellation' };
  const eff = pointInTimeStatus(c);
  // Watch flag for CE: due date falls in current projection month (display only)
  let watch = false;
  if (c.dueDate) {
    const dueKey = new Date(c.dueDate).getFullYear() * 12 + new Date(c.dueDate).getMonth();
    if (dueKey === TODAY_KEY) watch = true;
  }
  if (eff === 'In Force') return { cls: '100', reason: 'In Force', watch };
  if (eff === 'Contract Surrendered') {
    return monthsPaid(c) >= 13
      ? { cls: '100', reason: 'Contract Surrendered (≥13mo)', watch }
      : { cls: '0',   reason: 'Contract Surrendered (<13mo)' };
  }
  return { cls: '0', reason: 'Lapsed' };
}

/* ── At-risk clients: due date last month, In Force or Lapsed ── */
function getAtRisk(clients) {
  return clients.filter(c => {
    if (!c.dueDate) return false;
    const due = new Date(c.dueDate);
    if ((due.getFullYear() * 12 + due.getMonth()) !== PREV_KEY) return false;
    return c.status === 'In Force' || c.status === 'Lapsed';
  });
}

/* ── Compute PR13 for one agent ───────────────────────── */
function calcPR13(agent) {
  let eligACE = 0, collACE = 0, zeroACE = 0, exclACE = 0;
  let watchCount = 0, eligCount = 0, exclCount = 0, naCount = 0;
  const rows = [];

  for (const c of agent.clients) {
    const ace = getACE(c);
    const { cls, reason, watch } = classifyPR13(c);

    if (cls === 'na' || cls === 'excl') {
      exclACE += ace;
      if (cls === 'excl') exclCount++;
      else naCount++;
    } else if (cls === '100') {
      eligACE  += ace;
      collACE  += ace;
      eligCount++;
      if (watch) watchCount++;
    } else {
      eligACE += ace;
      zeroACE += ace;
      eligCount++;
    }
    rows.push({ ...c, _ace: ace, _cls: cls, _reason: reason, _watch: watch || false });
  }

  const pr13 = eligACE > 0 ? Math.round(collACE / eligACE * 10000) / 100 : null;
  return { pr13, eligACE, collACE, zeroACE, exclACE, eligCount, watchCount, exclCount, naCount, rows };
}

/* ── Compute GROUP PR13 for a leader (direct + downlines) ─ */
function calcGroupPR13(ag, allAgents) {
  if (!ag.downlines || !ag.downlines.length) return null;
  const combined = {
    clients: [
      ...ag.clients,
      ...ag.downlines.flatMap(code => {
        const sub = allAgents.find(a => a.code === code);
        return sub ? sub.clients : [];
      })
    ]
  };
  const r = calcPR13(combined);
  return r.pr13;
}

/* ── Compute CE for one agent ─────────────────────────── */
function calcCE(agent) {
  let eligACE = 0, collACE = 0, zeroACE = 0, exclACE = 0;
  let watchCount = 0, eligCount = 0, exclCount = 0, naCount = 0;
  const rows = [];

  for (const c of agent.clients) {
    const ace = getACE(c);
    const { cls, reason, watch } = classifyCE(c);

    if (cls === 'na' || cls === 'excl') {
      exclACE += ace;
      if (cls === 'excl') exclCount++;
      else naCount++;
    } else if (cls === '100') {
      eligACE  += ace;
      collACE  += ace;
      eligCount++;
      if (watch) watchCount++;
    } else {
      eligACE += ace;
      zeroACE += ace;
      eligCount++;
    }
    rows.push({ ...c, _ace: ace, _cls: cls, _reason: reason, _watch: watch || false });
  }

  const ce = eligACE > 0 ? Math.round(collACE / eligACE * 10000) / 100 : null;
  return { ce, eligACE, collACE, zeroACE, exclACE, eligCount, watchCount, exclCount, naCount, rows };
}

/* ── Render leaderboard ───────────────────────────────── */
function renderLeaderboard(data) {
  document.getElementById('updatedBadge').textContent = 'Data: ' + data.updated;
  document.getElementById('projBadge').textContent    = 'PR13 Projection: ' + projLabel();

  // Compute PR13 and CE for every agent, sort by PR13 desc (null last)
  const agents = data.agents.map(ag => ({
    ag,
    result:   calcPR13(ag),
    ceResult: calcCE(ag),
    groupPR13: calcGroupPR13(ag, data.agents)
  }));
  agents.sort((a, b) => {
    if (a.result.pr13 === null && b.result.pr13 === null) return 0;
    if (a.result.pr13 === null) return 1;
    if (b.result.pr13 === null) return -1;
    return b.result.pr13 - a.result.pr13;
  });

  // Compute at-risk counts for global summary
  const atRiskMap = {};
  let totalAtRisk = 0, agentsWithAtRisk = 0;
  agents.forEach(({ ag }) => {
    const ar = getAtRisk(ag.clients);
    atRiskMap[ag.code] = ar;
    totalAtRisk += ar.length;
    if (ar.length) agentsWithAtRisk++;
  });

  // Global alert banner
  const listEl = document.getElementById('leaderboardList');
  let html = '';
  if (totalAtRisk > 0) {
    html += `
      <div class="global-alert">
        <div class="global-alert-icon">🔴</div>

          <div class="global-alert-text">${totalAtRisk} client${totalAtRisk > 1 ? 's' : ''} need follow-up this month</div>

  html += agents.map(({ ag, result, ceResult, groupPR13 }, i) => {
    const { pr13, eligCount, eligACE, collACE: prCollACE } = result;
    const { ce, eligCount: ceEligCount } = ceResult;

    const hasData = pr13 !== null;
    const hasCEData = ce !== null;

    const prClass = !hasData ? 'pr13-grey' : pr13 >= 90 ? 'pr13-green' : pr13 >= 70 ? 'pr13-amber' : 'pr13-red';
    const prLabel = hasData ? pr13.toFixed(1) + '%' : '—';
    const ceClass = !hasCEData ? 'grey' : ce >= 90 ? 'green' : ce >= 70 ? 'amber' : 'red';
    const ceLabel = hasCEData ? ce.toFixed(1) + '%' : '—';
    const grpClass = !hasGroup ? 'pr13-grey' : groupPR13 >= 90 ? 'pr13-green' : groupPR13 >= 70 ? 'pr13-amber' : 'pr13-red';
    const grpLabel = hasGroup ? groupPR13.toFixed(1) + '%' : '';
    return `
      <div class="agent-card" onclick="showAgent('${ag.code}')">
        <div class="agent-main">
          <div class="agent-rank ${rankClass}">${rankLabel}</div>
          <div class="agent-info">
            <div class="agent-name">${ag.name}</div>
            <div class="agent-code">${ag.code}</div>
            <div class="agent-sub">${ag.total} clients total</div>
            ${atRisk.length ? `<span class="followup-pill">🔴 ${atRisk.length} follow-up needed</span>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:.68rem;font-weight:700;color:#aaa">${hasGroup ? 'Direct' : 'PR13'}</span>
              <span class="pr13-badge ${prClass}">${prLabel}</span>
            </div>
            ${hasGroup ? `<div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:.68rem;font-weight:700;color:#aaa">Group</span>

/* ── Audit table rendering ────────────────────────────── */
function renderAuditTable() {
  if (!window._detail) return;
  const { allRows, result, ceResult } = window._detail;
  const pool = window._currentPool;

  const poolRows = pool === 'CE'
    ? allRows.filter(r => r._pool === 'CE')
    : allRows.filter(r => r._pool === 'PR13' || r._pool === null);

  // Watch clients first, then 0%, excl, na, 100%
  const clsOrd = { '0': 1, 'excl': 2, 'na': 3, '100': 4 };
  const sorted = [...poolRows].sort((a, b) => {
    const aKey = a._watch ? 0 : (clsOrd[a._cls] ?? 3);
    const bKey = b._watch ? 0 : (clsOrd[b._cls] ?? 3);
    return aKey - bKey;
  });

  const metric  = pool === 'PR13' ? result : ceResult;
  const rate    = pool === 'PR13' ? result.pr13 : ceResult.ce;
  const hasRate = rate !== null;

  const clsHTML = (cls, watch) => {
    if (cls === '100')  return `<span class="cls-badge cls-100">${watch ? '⚠️ ' : ''}100%</span>`;
    if (cls === '0')    return `<span class="cls-badge cls-0">0%</span>`;
    if (cls === 'excl') return `<span class="cls-badge cls-excl">Excluded</span>`;
    return `<span class="cls-badge cls-na">Not eligible</span>`;
  };

  document.getElementById('auditBody').innerHTML = sorted.map((c, i) => {
    const isDim = c._cls === 'na' || c._cls === 'excl';
    const cbHtml = c._cls === '0'
      ? `<input type="checkbox" class="collect-cb" data-ace="${c._ace}" data-pool="${pool}" onchange="updateProjected()">`
      : '';
    return `
      <tr class="${isDim ? 'excl-row' : ''}" style="${c._watch ? 'background:rgba(199,119,0,.07);' : c.status === 'Lapsed' ? 'background:rgba(229,57,53,.05);' : ''}">
        <td style="color:#aaa;white-space:nowrap">${cbHtml}${i + 1}</td>
        <td><strong>${c.name || '—'}</strong>${c._watch ? '<br><span style="font-size:.68rem;font-weight:800;color:#c77700;background:rgba(199,119,0,.12);padding:2px 7px;border-radius:8px;display:inline-block;margin-top:2px">⚠️ Due this month</span>' : ''}<br><span style="font-size:.73rem;color:#aaa">${c.certNo || ''}</span></td>
        <td>${c.issueDate || '—'}</td>
        <td>${c.dueDate || '—'}</td>
        <td>${c.payMode || '—'}</td>
        <td class="right ${c._cls === '0' ? 'zero-ace' : ''}">${isDim ? '<span style="color:#ccc">—</span>' : RA(c._ace)}</td>
        <td>${c.payMethod || '—'}</td>
        <td><span class="badge ${c.status === 'In Force' ? 'badge-green' : 'badge-red'}" style="font-size:.72rem">${c.status}</span></td>
        <td>${clsHTML(c._cls, c._watch)}</td>
        <td style="font-size:.78rem;color:${c._watch ? '#c77700' : '#888'}">${c._reason}</td>
      </tr>`;
  }).join('');

  const tfoot = document.getElementById('auditFoot');
  if (hasRate) {
    const collACE = metric.collACE;
    const eligACE = metric.eligACE;
    const color = pool === 'PR13' ? '#0a9b43' : '#1a73e8';
    const bg    = pool === 'PR13' ? '#e6f9ee'  : '#e8f0fe';
    tfoot.innerHTML = `
      <tr style="background:${bg}">
        <td colspan="5" style="text-align:right;font-size:.9rem;font-weight:900;color:${color}">${pool} = ${RA(collACE)} ÷ ${RA(eligACE)} × 100</td>
        <td class="right" style="color:${color};font-size:1.1rem">${rate.toFixed(1)}%</td>
        <td colspan="4"></td>
      </tr>`;
  } else {
    tfoot.innerHTML = '';
  }

  updateProjected();
}

/* ── Projected rate bar (checkbox simulation) ─────────── */
function updateProjected() {
  if (!window._detail) return;
  const { result, ceResult } = window._detail;
  const pool = window._currentPool;
  const metric      = pool === 'PR13' ? result : ceResult;
  const currentRate = pool === 'PR13' ? result.pr13 : ceResult.ce;

  let addedACE = 0;
  document.querySelectorAll('.collect-cb:checked').forEach(cb => {
    if (cb.dataset.pool === pool) addedACE += parseFloat(cb.dataset.ace) || 0;
  });

  const projBar = document.getElementById('projectedBar');
  if (addedACE > 0 && currentRate !== null && metric.eligACE > 0) {
    const projRate = Math.round((metric.collACE + addedACE) / metric.eligACE * 1000) / 10;
    const delta    = projRate - currentRate;
    const color    = pool === 'PR13' ? '#0a9b43' : '#1a73e8';
    projBar.innerHTML = `
      <span style="font-weight:800">🎯 ${pool} if collected:</span>
      <span>${currentRate.toFixed(1)}%</span>
      <span style="color:#ccc">→</span>
      <strong style="color:${color};font-size:1rem">${projRate.toFixed(1)}%</strong>
      <span style="color:${color};font-weight:700">(+${delta.toFixed(1)}%)</span>
      <span style="font-size:.75rem;color:#888">RM ${Math.round(addedACE).toLocaleString('en-MY')} ACE collected</span>
    `;
    projBar.classList.remove('hidden');
  } else {
    projBar.classList.add('hidden');
  }
}

            ${ceResult.ce !== null ? ceResult.ce.toFixed(1) + '%' : '—'}
            <span style="color:#ccc">→</span>
            <strong style="color:#1a73e8">${projCE !== null ? projCE.toFixed(1) + '%' : '—'}</strong>
            ${delta !== null ? `<span class="est-delta" style="color:#1a73e8">(+${delta.toFixed(1)}%)</span>` : ''}
          </span>
        </div>`;
      ceResultEl.classList.remove('hidden');
    } else {
      ceResultEl.classList.add('hidden');
    }
  }

  // PR13 section
  const pr13Cases   = parseInt(document.getElementById('estPr13Count')?.value) || 0;
  const pr13Ace     = parseFloat(document.getElementById('estPr13Ace')?.value)  || 0;
  const pr13ResultEl = document.getElementById('estPr13Result');
  if (pr13ResultEl) {
    if (pr13Cases > 0 && pr13Ace > 0) {
      const newACE     = pr13Cases * pr13Ace;
      const projElig   = result.eligACE + newACE;
      const projColl   = result.collACE + newACE;
      const projPR13   = projElig > 0 ? Math.round(projColl / projElig * 1000) / 10 : null;
      const delta      = projPR13 !== null && result.pr13 !== null ? projPR13 - result.pr13 : null;
      pr13ResultEl.innerHTML = `
        <div class="est-result-row">
          <span class="est-result-lbl">New ACE added</span>
          <span class="est-result-val" style="font-weight:800">RM ${Math.round(newACE).toLocaleString('en-MY')}</span>
        </div>
        <div class="est-result-row">
          <span class="est-result-lbl" style="color:#0a9b43">PR13</span>
          <span class="est-result-val">
            ${result.pr13 !== null ? result.pr13.toFixed(1) + '%' : '—'}
            <span style="color:#ccc">→</span>
            <strong style="color:#0a9b43">${projPR13 !== null ? projPR13.toFixed(1) + '%' : '—'}</strong>
            ${delta !== null ? `<span class="est-delta" style="color:#0a9b43">(+${delta.toFixed(1)}%)</span>` : ''}
          </span>
        </div>`;
      pr13ResultEl.classList.remove('hidden');
    } else {
      pr13ResultEl.classList.add('hidden');
    }
  }
}

function showLeaderboard() {
  document.getElementById('viewLeaderboard').classList.remove('hidden');
  document.getElementById('viewDetail').classList.add('hidden');
  document.getElementById('navBack').style.display = 'none';
  document.getElementById('navSpacer').style.display = 'block';
  document.getElementById('navTitle').textContent = 'Agent PR13 Report';
}

/* ── Month picker ─────────────────────────────────────── */
function buildMonthPicker() {
  const sel = document.getElementById('monthPicker');
  if (!sel) return;
  const base = new Date(); base.setDate(1); base.setHours(0,0,0,0);
  sel.innerHTML = '';
  for (let i = 0; i <= 12; i++) {
    const d = new Date(base.getFullYear(), base.getMonth() - i, 1);
    const opt = document.createElement('option');
    opt.value = `${d.getFullYear()}-${d.getMonth()}`;
    opt.textContent = d.toLocaleString('en-MY', { month: 'long', year: 'numeric' });
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
}
function onMonthPick(val) {
  const [y, m] = val.split('-').map(Number);
  setProjectionMonth(y, m);
  renderLeaderboard(window._lastData);
}

/* ── Bootstrap ────────────────────────────────────────── */
fetch('data/pr-data.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => { window._lastData = data; buildMonthPicker(); renderLeaderboard(data); })
  .catch(err => {
    document.getElementById('leaderboardList').innerHTML =
      `<div class="error-box">Failed to load data.<br><small>${err.message}</small></div>`;
  });
</script>
</body>
